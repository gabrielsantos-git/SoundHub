<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projetar - SoundHub</title>
    <link rel="stylesheet" href="/css/project.css">
</head>
<body>
    <!-- Sidebar unificada será injetada pelo sidebar.js -->
    <script src="sidebar.js"></script>

    <!-- Header -->
    <header class="header">
        <div class="logo">🎵 SoundHub</div>
        <div class="user-info">
            <span id="userName">Carregando...</span>
            <span id="userRole" class="user-role">...</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Normal View -->
        <div id="normalView">
            <div class="card">
                <div class="card-header">
                    <h1 class="card-title">🎥 Sistema de Projeção</h1>
                    <button class="btn btn-primary" onclick="refreshMedia()">
                        🔄 Atualizar
                    </button>
                </div>
                
                <div id="projectionStatus" class="status ready">
                    Sistema pronto para projeção
                </div>
            </div>

            <div class="grid">
                <!-- Media Selection -->
                <div>
                    <div class="card">
                        <h2 class="card-title">📁 Mídias Disponíveis</h2>
                        
                        <div id="mediaContainer">
                            <div class="loading">
                                <div class="spinner"></div>
                                <div>Carregando mídias...</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Screen Selection -->
                <div>
                    <div class="card">
                        <h2 class="card-title">🖥️ Telas Disponíveis</h2>
                        
                        <div id="screenContainer">
                            <button class="btn btn-primary" onclick="detectScreens()">
                                🔍 Detectar Telas
                            </button>
                        </div>
                    </div>

                    <div class="card">
                        <h2 class="card-title">🎯 Controle de Projeção</h2>
                        
                        <div id="projectionButtons">
                            <button class="btn btn-primary" id="projectBtn" disabled onclick="startProjection()">
                                ▶️ Projetar
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Control Panel View -->
        <div id="controlPanel" class="control-panel">
            <div class="card-header">
                <h1 class="card-title">🎮 Painel de Controle</h1>
                <button class="btn btn-danger" onclick="endProjection()">
                    ⏹️ Finalizar Projeção
                </button>
            </div>

            <div class="preview-container">
                <div class="preview-item">
                    <div class="preview-label">Mídia Atual</div>
                    <div id="currentPreview" class="preview-image">
                        <div style="display: flex; align-items: center; justify-content: center; height: 150px; color: #64748b;">
                            Nenhuma mídia
                        </div>
                    </div>
                </div>
                <div class="preview-item">
                    <div class="preview-label">Próxima Mídia</div>
                    <div id="nextPreview" class="preview-image">
                        <div style="display: flex; align-items: center; justify-content: center; height: 150px; color: #64748b;">
                            Nenhuma mídia
                        </div>
                    </div>
                </div>
            </div>

            <div class="control-buttons">
                <button class="btn btn-secondary" onclick="previousMedia()">
                    ⏮️ Anterior
                </button>
                <button class="btn btn-primary" onclick="playPauseMedia()">
                    ⏸️ Pausar
                </button>
                <button class="btn btn-secondary" onclick="nextMedia()">
                    ⏭️ Próximo
                </button>
                <button class="btn btn-secondary" onclick="toggleProjectionFullscreen()">
                    🖥️ Tela Cheia
                </button>
            </div>

            <div class="card">
                <h3 class="card-title">📋 Lista de Mídias</h3>
                <div id="mediaList" class="media-list">
                    <!-- Media list will be populated here -->
                </div>
            </div>
        </div>
    </main>

    <script src="project.js"></script>
<script src="navigation.js"></script>
</body>
</html>
