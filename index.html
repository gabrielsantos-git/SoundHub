 <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/assets/SounHub-03.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundHub - Sistema de Mídia para Igrejas</title>
    <meta name="description" content="Sistema completo para organização e projeção de mídia em igrejas">
    <link rel="stylesheet" href="/css/sidebar.css">
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=cached" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=calendar_month" />

</head>
<body>
    <!-- Sidebar unificada será injetada pelo sidebar.js -->
    <script src="sidebar.js"></script>

    <!-- Main Content -->
    <main class="main-content">

        <div class="card">
            <div class="card-header">
                <h1 class="card-title">Bem-vindo ao SoundHub</h1>
                <button class="btn-primary" onclick="refreshFiles()">
                    Atualizar
                </button>
            </div>

            <div id="filesContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Carregando arquivos...</div>
                </div>
            </div>
        </div>

        <!-- Widget: Próximos dias de escala (visível para SONOPLASTA e DIRETOR) -->
        <div id="scheduleWidget" style="display:none;background:#fff;border-radius:12px;border:1px solid #e5e7eb;margin-top:1.5rem;box-shadow:0 1px 4px rgba(0,0,0,.04);overflow:hidden;">
            <button onclick="toggleScheduleWidget()" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;background:none;border:none;cursor:pointer;text-align:left;">
                <h2 style="font-size:1rem;font-weight:600;color:#1f2937;margin:0;">Próximos dias de escala</h2>
                <svg id="scheduleChevron" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transition:transform .2s;transform:rotate(0deg)"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div id="scheduleWidgetBody" style="display:none;padding:0 1.5rem 1.25rem;">
                <div id="scheduleDaysList"></div>
                <a href="/schedule" style="display:inline-block;margin-top:0.75rem;font-size:0.8125rem;color:#3b82f6;text-decoration:none;">Ver escala completa →</a>
            </div>
        </div>
    </main>

    <!-- Modal de Autenticação -->
    <div class="overlay" id="authOverlay">
        <div class="auth-required">
            <h2>Autenticação Necessária</h2>
            <p>Você precisa estar logado para acessar o SoundHub.</p>
            <a href="/auth" class="btn btn-primary" style="width: 100%;">
                Acessar Sistema
            </a>
        </div>
    </div>

    <script>
        let currentUser = null;
        
        // Verificar autenticação ao carregar
        document.addEventListener('DOMContentLoaded', function() {
            try {
                checkAuth();
            } catch (error) {
                console.error('Erro no DOMContentLoaded:', error);
                // Tentar novamente após um pequeno delay
                setTimeout(() => {
                    try {
                        checkAuth();
                    } catch (retryError) {
                        console.error('Erro na segunda tentativa:', retryError);
                    }
                }, 100);
            }
        });
        
        async function checkAuth() {
            const token = localStorage.getItem('token');

            if (!token) {
                window.location.href = '/auth';
                return;
            }

            try {
                const response = await fetch('/api/auth/me', {
                    headers: { 'Authorization': 'Bearer ' + token },
                    cache: 'no-store'
                });

                if (response.ok) {
                    const data = await response.json();
                    currentUser = data.user;
                    updateUserInterface();
                    loadFiles();
                    loadMySchedule();
                    _startAutoRefresh();
                } else {
                    localStorage.removeItem('token');
                    showAuthRequired();
                }
            } catch (error) {
                showAuthRequired();
            }
        }
        
        function showAuthRequired() {
            // Redirecionar automaticamente para página de autenticação
            window.location.href = '/auth';
        }
        
        function updateUserInterface() {
            if (!currentUser) return;
            
            document.getElementById('userName').textContent = currentUser.nome;
            document.getElementById('userRole').textContent = currentUser.cargo;
            
            // Sidebar gerenciada pelo sidebar.js
            if (typeof updateSidebar === 'function') updateSidebar(currentUser);

            // Push notifications
            if (typeof window.iniciarPushNotifications === 'function') {
                window.iniciarPushNotifications(token);
            }
        }
        
        let _loadingFilesList = false;

        async function loadFiles(silent = false) {
            if (_loadingFilesList) return;
            _loadingFilesList = true;
            const filesContainer = document.getElementById('filesContainer');

            try {
                const token = localStorage.getItem('token');
                if (!token) { showAuthRequired(); return; }

                const response = await fetch('/api/files/approved', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (response.ok) {
                    const files = await response.json();
                    displayFiles(files);
                } else if (response.status === 401 || response.status === 403) {
                    localStorage.removeItem('token');
                    showAuthRequired();
                }
            } catch (error) {
                if (!silent) {
                    filesContainer.innerHTML = `
                        <div class="empty-state">
                            <h3>Erro ao Carregar</h3>
                            <p>Não foi possível carregar os arquivos.</p>
                            <button class="btn btn-primary" onclick="refreshFiles()">Tentar Novamente</button>
                        </div>`;
                }
            } finally {
                _loadingFilesList = false;
            }
        }

        function _startAutoRefresh() {
            setInterval(() => {
                if (document.hidden) return;
                if (document.querySelector('.modal.open, .modal.show')) return;
                loadFiles(true);
            }, 10000);
        }
        
        function displayFiles(files) {
            const filesContainer = document.getElementById('filesContainer');
            
            if (files.length === 0) {
                filesContainer.innerHTML = `
                    <div class="empty-state">
                        <h3>Nenhum Arquivo Encontrado</h3>
                        <p>Nenhum arquivo encontrado.</p>
                    </div>
                `;
                return;
            }

            // Lógica de agrupamento por data
            const grouped = files.reduce((acc, file) => {
                const date = new Date(file.data_upload).toLocaleDateString('pt-BR', {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric'
                });
                if (!acc[date]) acc[date] = [];
                acc[date].push(file);
                return acc;
            }, {});

            let html = '';
            for (const [date, items] of Object.entries(grouped)) {
                html += `
                    <div class="media-date-group" style="margin-bottom: 2rem;">
                        <div class="media-date-header" style="font-weight: bold; padding: 10px; background: #f3f4f6; border-radius: 8px; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;">
                            <span> ${date}</span>
                            <div class="group-actions" style="display: flex; gap: 0.5rem;">
                                ${currentUser && (currentUser.cargo === 'SONOPLASTA' || currentUser.cargo === 'DIRETOR') ? 
                                    `<button class="btn btn-primary btn-sm" onclick="projectGroup('${date}', ${JSON.stringify(items.map(f => f.id))})">Projetar Grupo</button>` : ''}
                                <button class="btn btn-secondary btn-sm" onclick="downloadGroup('${date}', ${JSON.stringify(items.map(f => f.id))})">Baixar Tudo</button>
                            </div>
                        </div>
                        <div class="files-list">
                            ${items.map(file => renderFileItem(file)).join('')}
                        </div>
                    </div>`;
            }
            
            filesContainer.innerHTML = html;
        }

        function escapeHtml(str) {
            return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        // Função auxiliar para manter o layout do item original
        function renderFileItem(file) {
            const fileType = file.tipo.includes('image') ? 'image' : file.tipo.includes('video') ? 'video' : 'pdf';
            const typeClass = `type-${fileType}`;
            const typeName = fileType === 'image' ? 'Imagem' : fileType === 'video' ? 'Vídeo' : 'PDF';

            const formattedDate = new Date(file.data_upload).toLocaleDateString('pt-BR', {
                day: 'numeric',
                month: 'long',
                weekday: 'long'
            });

            const canDelete = currentUser && (currentUser.cargo === 'ADMIN' || currentUser.cargo === 'DIRETOR');
            const nomeEsc = escapeHtml(file.nome);
            const usuarioEsc = escapeHtml(file.usuario_nome);

            return `
                <div class="file-item" id="file-item-${file.id}">
                    <div class="file-info">
                        <h3>${nomeEsc}</h3>
                        <p>${formattedDate} • ${usuarioEsc}</p>
                        <span class="file-type ${typeClass}">${typeName}</span>
                    </div>
                    <div class="file-actions">
                        <button class="btn btn-secondary" onclick="downloadFile(${file.id}, ${JSON.stringify(file.nome)})">
                            Baixar
                        </button>
                        ${canDelete ? `<button class="btn btn-danger" onclick="deleteFile(${file.id}, ${JSON.stringify(file.nome)})">Excluir</button>` : ''}
                    </div>
                </div>`;
        }

        async function deleteFile(fileId, fileName) {
            if (!confirm(`Tem certeza que deseja excluir "${fileName}"? Esta ação não pode ser desfeita.`)) return;

            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/api/files/${fileId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (response.ok) {
                    const item = document.getElementById(`file-item-${fileId}`);
                    if (item) item.remove();
                } else {
                    const result = await response.json().catch(() => ({}));
                    alert(result.error || 'Erro ao excluir arquivo');
                }
            } catch (error) {
                console.error('Erro ao excluir arquivo:', error);
                alert('Erro de conexão. Tente novamente.');
            }
        }
        
        async function downloadFile(fileId, fileName) {
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    showAuthRequired();
                    return;
                }
                
                const response = await fetch(`/api/files/download/${fileId}`, {
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    try {
                        const blob = await response.blob();
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = fileName;
                        document.body.appendChild(a);
                        a.click();
                        
                        // Limpar recursos de forma segura
                        setTimeout(() => {
                            try {
                                window.URL.revokeObjectURL(url);
                                document.body.removeChild(a);
                            } catch (cleanupError) {
                                console.warn('Erro ao limpar recursos de download:', cleanupError);
                            }
                        }, 100);
                    } catch (blobError) {
                        console.error('Erro ao processar blob:', blobError);
                        console.log('Erro ao processar arquivo para download');
                    }
                } else if (response.status === 401 || response.status === 403) {
                    localStorage.removeItem('token');
                    showAuthRequired();
                } else {
                    console.log('Erro ao baixar arquivo');
                }
            } catch (error) {
                console.error('Erro de conexão:', error);
                console.log('Erro de conexão ao baixar arquivo');
            }
        }
        
        // Função para baixar todos os arquivos de um grupo como ZIP
        async function downloadGroup(date, fileIds) {
            try {
                console.log(`Baixando ${fileIds.length} arquivos do grupo ${date} como ZIP`);
                
                const token = localStorage.getItem('token');
                if (!token) {
                    showAuthRequired();
                    return;
                }
                
                const response = await fetch('/api/files/download-zip', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        fileIds: fileIds,
                        groupName: date
                    })
                });
                
                if (response.ok) {
                    // Criar blob e download do ZIP
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${date.replace(/[^a-zA-Z0-9]/g, '_')}_arquivos.zip`;
                    document.body.appendChild(a);
                    a.click();
                    
                    // Limpar recursos de forma segura
                    setTimeout(() => {
                        try {
                            window.URL.revokeObjectURL(url);
                            document.body.removeChild(a);
                        } catch (cleanupError) {
                            console.warn('Erro ao limpar recursos de download ZIP:', cleanupError);
                        }
                    }, 100);
                    
                    console.log(`ZIP com ${fileIds.length} arquivos baixado com sucesso!`);
                } else if (response.status === 401 || response.status === 403) {
                    localStorage.removeItem('token');
                    showAuthRequired();
                } else {
                    const error = await response.json();
                    console.log(`Erro ao baixar grupo: ${error.error || 'Erro desconhecido'}`);
                }
            } catch (error) {
                console.error('Erro ao baixar grupo como ZIP:', error);
                console.log('Erro de conexão ao baixar arquivos do grupo');
            }
        }
        
        // Função para projetar grupo de mídias
        function projectGroup(date, fileIds) {
            try {
                console.log(`Projetando grupo ${date} com ${fileIds.length} arquivos`);
                
                // Salvar IDs das mídias no localStorage para o project.html recuperar
                localStorage.setItem('selectedMediaIds', JSON.stringify(fileIds));
                localStorage.setItem('projectGroupName', date);
                
                // Redirecionar para página de projeção
                window.location.href = '/project.html';
            } catch (error) {
                console.error('Erro ao projetar grupo:', error);
                console.log('Erro ao iniciar projeção do grupo');
            }
        }
        
        function toggleScheduleWidget() {
            const body = document.getElementById('scheduleWidgetBody');
            const chevron = document.getElementById('scheduleChevron');
            const open = body.style.display === 'none';
            body.style.display = open ? 'block' : 'none';
            chevron.style.transform = open ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        async function loadMySchedule() {
            if (!currentUser || currentUser.cargo === 'ADMIN') return;
            const token = localStorage.getItem('token');
            try {
                const res = await fetch('/api/schedules/my-days', { headers: { 'Authorization': 'Bearer ' + token } });
                if (!res.ok) return;
                const days = await res.json();
                const widget = document.getElementById('scheduleWidget');
                const list = document.getElementById('scheduleDaysList');
                if (!days.length) {
                    widget.style.display = 'block';
                    list.innerHTML = '<p style="color:#9ca3af;font-size:0.875rem;margin:0;">Nenhum dia agendado nos próximos dias.</p>';
                    return;
                }
                const DIA_LABEL = { sabado:'Sábado', domingo:'Domingo', quarta:'Quarta-feira', segunda:'Segunda-feira', terca:'Terça-feira', quinta:'Quinta-feira', sexta:'Sexta-feira' };
                const hoje = new Date().toISOString().split('T')[0];
                list.innerHTML = days.map(d => {
                    const data = new Date(d.data_especifica + 'T12:00:00').toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' });
                    const isHoje = d.data_especifica === hoje;
                    const label = DIA_LABEL[d.dia_semana] || d.dia_semana;
                    return `<div style="display:flex;align-items:center;gap:0.75rem;padding:0.5rem 0;border-bottom:1px solid #f3f4f6;">
                        <span style="width:8px;height:8px;border-radius:50%;background:${isHoje ? '#22c55e' : '#3b82f6'};flex-shrink:0;"></span>
                        <span style="font-size:0.9375rem;color:#374151;flex:1;">${label}, ${data}</span>
                        ${isHoje ? '<span style="font-size:0.75rem;background:#dcfce7;color:#16a34a;padding:2px 8px;border-radius:9999px;font-weight:600;">Hoje</span>' : ''}
                    </div>`;
                }).join('');
                // remover borda do último item
                const last = list.lastElementChild;
                if (last) last.style.borderBottom = 'none';
                widget.style.display = 'block';
            } catch (e) { /* silencioso */ }
        }

        function refreshFiles() {
            const filesContainer = document.getElementById('filesContainer');
            filesContainer.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Atualizando...</div>
                </div>
            `;
            loadFiles();
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }
        
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }
        
        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('show');
        }
    </script>
    <script src="navigation.js"></script>
</body>
</html>
