 <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundHub - Sistema de Mídia para Igrejas</title>
    <meta name="description" content="Sistema completo para organização e projeção de mídia em igrejas">
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=cached" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=calendar_month" />

</head>
<body>
    <!-- Sidebar unificada será injetada pelo sidebar.js -->
    <script src="sidebar.js"></script>

    <!-- Main Content -->
    <main class="main-content">
        <div class="card">
            <div class="card-header">
                <h1 class="card-title">Bem-vindo ao SoundHub</h1>
                <button class="btn-primary" onclick="refreshFiles()">
                    Atualizar
                </button>
            </div>
            
            <div id="filesContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Carregando arquivos...</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal de Autenticação -->
    <div class="overlay" id="authOverlay">
        <div class="auth-required">
            <h2>Autenticação Necessária</h2>
            <p>Você precisa estar logado para acessar o SoundHub.</p>
            <a href="/auth" class="btn btn-primary" style="width: 100%;">
                Acessar Sistema
            </a>
        </div>
    </div>

    <script>
        let currentUser = null;
        
        // Verificar autenticação ao carregar
        document.addEventListener('DOMContentLoaded', function() {
            try {
                checkAuth();
            } catch (error) {
                console.error('Erro no DOMContentLoaded:', error);
                // Tentar novamente após um pequeno delay
                setTimeout(() => {
                    try {
                        checkAuth();
                    } catch (retryError) {
                        console.error('Erro na segunda tentativa:', retryError);
                    }
                }, 100);
            }
        });
        
        async function checkAuth() {
            console.log('Verificando autenticação...');
            const token = localStorage.getItem('token');
            const authOverlay = document.getElementById('authOverlay');
            const filesContainer = document.getElementById('filesContainer');
            
            console.log('Token encontrado:', token ? 'SIM' : 'NÃO');
            console.log('Token completo:', token);
            
            if (!token) {
                console.log('Token não encontrado, redirecionando para /auth');
                // Redirecionar automaticamente para página de autenticação
                window.location.href = '/auth';
                return;
            }
            
            try {
                console.log('Enviando requisição para /api/auth/me...');
                const response = await fetch('/api/auth/me', {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                console.log('Status da resposta:', response.status);
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('Usuário autenticado:', data.user);
                    currentUser = data.user;
                    updateUserInterface();
                    loadFiles();
                } else {
                    console.log('Falha na autenticação, status:', response.status);
                    const errorData = await response.json();
                    console.log('Erro:', errorData);
                    localStorage.removeItem('token');
                    showAuthRequired();
                }
            } catch (error) {
                console.log('Erro na requisição:', error);
                showAuthRequired();
            }
        }
        
        function showAuthRequired() {
            // Redirecionar automaticamente para página de autenticação
            window.location.href = '/auth';
        }
        
        function updateUserInterface() {
            if (!currentUser) return;
            
            document.getElementById('userName').textContent = currentUser.nome;
            document.getElementById('userRole').textContent = currentUser.cargo;
            
            // Sidebar gerenciada pelo sidebar.js
            if (typeof updateSidebar === 'function') updateSidebar(currentUser);
        }
        
        async function loadFiles() {
            const filesContainer = document.getElementById('filesContainer');
            
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    showAuthRequired();
                    return;
                }
                
                const response = await fetch('/api/files/approved', {
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const files = await response.json();
                    displayFiles(files);
                } else if (response.status === 401 || response.status === 403) {
                    localStorage.removeItem('token');
                    showAuthRequired();
                } else {
                    throw new Error('Erro ao carregar arquivos');
                }
            } catch (error) {
                filesContainer.innerHTML = `
                    <div class="empty-state">
                        <h3>Erro ao Carregar</h3>
                        <p>Não foi possível carregar os arquivos.</p>
                        <button class="btn btn-primary" onclick="refreshFiles()">Tentar Novamente</button>
                    </div>
                `;
            }
        }
        
        function displayFiles(files) {
            const filesContainer = document.getElementById('filesContainer');
            
            if (files.length === 0) {
                filesContainer.innerHTML = `
                    <div class="empty-state">
                        <h3>Nenhum Arquivo Encontrado</h3>
                        <p>Nenhum arquivo encontrado.</p>
                    </div>
                `;
                return;
            }

            // Lógica de agrupamento por data
            const grouped = files.reduce((acc, file) => {
                const date = new Date(file.data_upload).toLocaleDateString('pt-BR', {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric'
                });
                if (!acc[date]) acc[date] = [];
                acc[date].push(file);
                return acc;
            }, {});

            let html = '';
            for (const [date, items] of Object.entries(grouped)) {
                html += `
                    <div class="media-date-group" style="margin-bottom: 2rem;">
                        <div class="media-date-header" style="font-weight: bold; padding: 10px; background: #f3f4f6; border-radius: 8px; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;">
                            <span> ${date}</span>
                            <div class="group-actions" style="display: flex; gap: 0.5rem;">
                                ${currentUser && (currentUser.cargo === 'SONOPLASTA' || currentUser.cargo === 'DIRETOR') ? 
                                    `<button class="btn btn-primary btn-sm" onclick="projectGroup('${date}', ${JSON.stringify(items.map(f => f.id))})">Projetar Grupo</button>` : ''}
                                <button class="btn btn-secondary btn-sm" onclick="downloadGroup('${date}', ${JSON.stringify(items.map(f => f.id))})">Baixar Tudo</button>
                            </div>
                        </div>
                        <div class="files-list">
                            ${items.map(file => renderFileItem(file)).join('')}
                        </div>
                    </div>`;
            }
            
            filesContainer.innerHTML = html;
        }

        function escapeHtml(str) {
            return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        // Função auxiliar para manter o layout do item original
        function renderFileItem(file) {
            const fileType = file.tipo.includes('image') ? 'image' : file.tipo.includes('video') ? 'video' : 'pdf';
            const typeClass = `type-${fileType}`;
            const typeName = fileType === 'image' ? 'Imagem' : fileType === 'video' ? 'Vídeo' : 'PDF';

            const formattedDate = new Date(file.data_upload).toLocaleDateString('pt-BR', {
                day: 'numeric',
                month: 'long',
                weekday: 'long'
            });

            const canDelete = currentUser && (currentUser.cargo === 'ADMIN' || currentUser.cargo === 'DIRETOR');
            const nomeEsc = escapeHtml(file.nome);
            const usuarioEsc = escapeHtml(file.usuario_nome);

            return `
                <div class="file-item" id="file-item-${file.id}">
                    <div class="file-info">
                        <h3>${nomeEsc}</h3>
                        <p>${formattedDate} • ${usuarioEsc}</p>
                        <span class="file-type ${typeClass}">${typeName}</span>
                    </div>
                    <div class="file-actions">
                        <button class="btn btn-secondary" onclick="downloadFile(${file.id}, ${JSON.stringify(file.nome)})">
                            Baixar
                        </button>
                        ${canDelete ? `<button class="btn btn-danger" onclick="deleteFile(${file.id}, ${JSON.stringify(file.nome)})">Excluir</button>` : ''}
                    </div>
                </div>`;
        }

        async function deleteFile(fileId, fileName) {
            if (!confirm(`Tem certeza que deseja excluir "${fileName}"? Esta ação não pode ser desfeita.`)) return;

            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/api/files/${fileId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (response.ok) {
                    const item = document.getElementById(`file-item-${fileId}`);
                    if (item) item.remove();
                } else {
                    const result = await response.json().catch(() => ({}));
                    alert(result.error || 'Erro ao excluir arquivo');
                }
            } catch (error) {
                console.error('Erro ao excluir arquivo:', error);
                alert('Erro de conexão. Tente novamente.');
            }
        }
        
        async function downloadFile(fileId, fileName) {
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    showAuthRequired();
                    return;
                }
                
                const response = await fetch(`/api/files/download/${fileId}`, {
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    try {
                        const blob = await response.blob();
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = fileName;
                        document.body.appendChild(a);
                        a.click();
                        
                        // Limpar recursos de forma segura
                        setTimeout(() => {
                            try {
                                window.URL.revokeObjectURL(url);
                                document.body.removeChild(a);
                            } catch (cleanupError) {
                                console.warn('Erro ao limpar recursos de download:', cleanupError);
                            }
                        }, 100);
                    } catch (blobError) {
                        console.error('Erro ao processar blob:', blobError);
                        console.log('Erro ao processar arquivo para download');
                    }
                } else if (response.status === 401 || response.status === 403) {
                    localStorage.removeItem('token');
                    showAuthRequired();
                } else {
                    console.log('Erro ao baixar arquivo');
                }
            } catch (error) {
                console.error('Erro de conexão:', error);
                console.log('Erro de conexão ao baixar arquivo');
            }
        }
        
        // Função para baixar todos os arquivos de um grupo como ZIP
        async function downloadGroup(date, fileIds) {
            try {
                console.log(`Baixando ${fileIds.length} arquivos do grupo ${date} como ZIP`);
                
                const token = localStorage.getItem('token');
                if (!token) {
                    showAuthRequired();
                    return;
                }
                
                const response = await fetch('/api/files/download-zip', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        fileIds: fileIds,
                        groupName: date
                    })
                });
                
                if (response.ok) {
                    // Criar blob e download do ZIP
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${date.replace(/[^a-zA-Z0-9]/g, '_')}_arquivos.zip`;
                    document.body.appendChild(a);
                    a.click();
                    
                    // Limpar recursos de forma segura
                    setTimeout(() => {
                        try {
                            window.URL.revokeObjectURL(url);
                            document.body.removeChild(a);
                        } catch (cleanupError) {
                            console.warn('Erro ao limpar recursos de download ZIP:', cleanupError);
                        }
                    }, 100);
                    
                    console.log(`ZIP com ${fileIds.length} arquivos baixado com sucesso!`);
                } else if (response.status === 401 || response.status === 403) {
                    localStorage.removeItem('token');
                    showAuthRequired();
                } else {
                    const error = await response.json();
                    console.log(`Erro ao baixar grupo: ${error.error || 'Erro desconhecido'}`);
                }
            } catch (error) {
                console.error('Erro ao baixar grupo como ZIP:', error);
                console.log('Erro de conexão ao baixar arquivos do grupo');
            }
        }
        
        // Função para projetar grupo de mídias
        function projectGroup(date, fileIds) {
            try {
                console.log(`Projetando grupo ${date} com ${fileIds.length} arquivos`);
                
                // Salvar IDs das mídias no localStorage para o project.html recuperar
                localStorage.setItem('selectedMediaIds', JSON.stringify(fileIds));
                localStorage.setItem('projectGroupName', date);
                
                // Redirecionar para página de projeção
                window.location.href = '/project.html';
            } catch (error) {
                console.error('Erro ao projetar grupo:', error);
                console.log('Erro ao iniciar projeção do grupo');
            }
        }
        
        function refreshFiles() {
            const filesContainer = document.getElementById('filesContainer');
            filesContainer.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Atualizando...</div>
                </div>
            `;
            loadFiles();
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }
        
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }
        
        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('show');
        }
    </script>
    <script src="navigation.js"></script>
</body>
</html>
