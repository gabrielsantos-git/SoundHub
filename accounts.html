<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/assets/SounHub-03.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contas - SoundHub</title>
    <link rel="stylesheet" href="/css/sidebar.css">
    <link rel="stylesheet" href="/css/accounts.css">
</head>
<body>
    <script src="sidebar.js"></script>

    <main class="main-content">

        <!-- Card principal com abas -->
        <div class="card">
            <div class="card-header">
                <div class="tabs-header">
                    <button class="tab-btn active" onclick="switchTab('active')" id="activeTab">
                        Contas Ativas
                    </button>
                    <button class="tab-btn" onclick="switchTab('pending')" id="pendingTab">
                        Contas Pendentes
                    </button>
                </div>
                <button class="btn-refresh" onclick="refreshUsers()">Atualizar</button>
            </div>

            <!-- Contas Ativas -->
            <div id="activeContent" class="tab-content">
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Usuário</th>
                                <th>Cargo</th>
                                <th>Status</th>
                                <th>Data</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr>
                                <td colspan="5" style="text-align:center;padding:2rem;">
                                    <div class="loading"><div class="spinner"></div><div>Carregando usuários...</div></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Contas Pendentes -->
            <div id="pendingContent" class="tab-content" style="display:none">
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Email</th>
                                <th>Data do Pedido</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="pendingUsersTableBody">
                            <tr>
                                <td colspan="4" style="text-align:center;padding:2rem;">
                                    <div class="loading"><div class="spinner"></div><div>Carregando pendências...</div></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <!-- Modal de Edição de Usuário -->
    <div class="modal" id="editUserModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Editar Usuário</h2>
                <button class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            <form id="editUserForm">
                <div class="form-group">
                    <label for="editNome">Nome</label>
                    <input type="text" id="editNome" name="nome" required>
                </div>
                <div class="form-group">
                    <label for="editEmail">Email</label>
                    <input type="email" id="editEmail" name="email" required>
                </div>
                <div class="form-group">
                    <label for="editSenha">Nova Senha (deixe em branco para manter atual)</label>
                    <input type="password" id="editSenha" name="senha" placeholder="Nova senha">
                </div>
                <div class="form-group">
                    <label for="editCargo">Cargo</label>
                    <select id="editCargo" name="cargo">
                        <option value="SONOPLASTA">Sonoplasta</option>
                        <option value="DIRETOR">Diretor</option>
                        <option value="ADMIN">Administrador</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', checkAuth);

        async function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = '/auth'; return; }

            try {
                const res = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token }, cache: 'no-store' });
                if (!res.ok) { localStorage.removeItem('token'); window.location.href = '/auth'; return; }

                const data = await res.json();
                currentUser = data.user;

                if (currentUser.cargo !== 'DIRETOR' && currentUser.cargo !== 'ADMIN') {
                    window.location.href = '/profile';
                    return;
                }

                if (typeof updateSidebar === 'function') updateSidebar(currentUser);
                if (typeof window.iniciarPushNotifications === 'function') window.iniciarPushNotifications(token);
                loadUsers();
                _startAutoRefresh();
            } catch (e) {
                window.location.href = '/auth';
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.getElementById(tab + 'Content').style.display = 'block';
            if (tab === 'active') loadUsers();
            else loadPendingUsers();
        }

        function refreshUsers() {
            const active = document.querySelector('.tab-btn.active');
            if (active && active.id === 'pendingTab') loadPendingUsers();
            else loadUsers();
        }

        let _loadingUsers = false;

        function loadUsers(silent = false) {
            if (_loadingUsers) return;
            _loadingUsers = true;
            const token = localStorage.getItem('token');
            const tbody = document.getElementById('usersTableBody');
            if (!silent) tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:2rem;"><div class="loading"><div class="spinner"></div><div>Carregando usuários...</div></div></td></tr>`;

            fetch('/api/users', { headers: { 'Authorization': 'Bearer ' + token } })
                .then(r => r.json())
                .then(users => {
                    if (!users.length) {
                        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:2rem;"><div class="empty-state"><h3>Nenhum usuário encontrado</h3><p>Nenhum usuário cadastrado no sistema.</p></div></td></tr>`;
                        return;
                    }
                    tbody.innerHTML = users.map(u => `
                        <tr>
                            <td><div class="user-info-cell"><div class="user-name">${u.nome}</div><div class="user-email">${u.email}</div></div></td>
                            <td><span class="badge badge-${getCargoBadgeClass(u.cargo)}">${getCargoDisplay(u.cargo)}</span></td>
                            <td><span class="badge badge-${getStatusBadgeClass(u.status)}">${getStatusDisplay(u.status)}</span></td>
                            <td>${new Date(u.data_cadastro).toLocaleDateString('pt-BR')}</td>
                            <td><div class="actions">
                                ${u.id !== currentUser.id ? `<button class="btn btn-secondary" onclick="editUser(${u.id})">Editar</button>` : ''}
                                ${u.id !== currentUser.id ? `<button class="btn btn-danger" onclick="deleteUser(${u.id})">Excluir</button>` : ''}
                            </div></td>
                        </tr>`).join('');
                })
                .catch(() => {
                    if (!silent) tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:2rem;"><div class="empty-state"><h3>Erro ao Carregar</h3><p>Não foi possível carregar os usuários.</p><button class="btn btn-primary" onclick="loadUsers()">Tentar Novamente</button></div></td></tr>`;
                })
                .finally(() => { _loadingUsers = false; });
        }

        let _loadingPending = false;

        function loadPendingUsers(silent = false) {
            if (_loadingPending) return;
            _loadingPending = true;
            const token = localStorage.getItem('token');
            const tbody = document.getElementById('pendingUsersTableBody');
            if (!silent) tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:2rem;"><div class="loading"><div class="spinner"></div><div>Carregando pendências...</div></div></td></tr>`;

            fetch('/api/users/pending', { headers: { 'Authorization': 'Bearer ' + token } })
                .then(r => r.json())
                .then(users => {
                    if (!Array.isArray(users) || !users.length) {
                        tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:2rem;"><div class="empty-state"><h3>Nenhuma conta pendente</h3><p>Nenhuma conta aguardando aprovação.</p></div></td></tr>`;
                        return;
                    }
                    tbody.innerHTML = users.map(u => `
                        <tr>
                            <td>${u.nome}</td>
                            <td>${u.email}</td>
                            <td>${new Date(u.data_cadastro).toLocaleDateString('pt-BR')}</td>
                            <td>
                                <select id="cargo-${u.id}" class="cargo-select" style="padding:0.3rem 0.5rem;border:1px solid #e5e7eb;border-radius:0.375rem;font-size:0.875rem;margin-bottom:0.4rem;width:100%;">
                                    <option value="SONOPLASTA" ${u.cargo === 'SONOPLASTA' ? 'selected' : ''}>Sonoplasta</option>
                                    <option value="DIRETOR" ${u.cargo === 'DIRETOR' ? 'selected' : ''}>Diretor</option>
                                </select>
                                <div class="actions">
                                    <button class="btn btn-success" onclick="approveUser(${u.id})">Aprovar</button>
                                    <button class="btn btn-danger" onclick="rejectUser(${u.id})">Recusar</button>
                                </div>
                            </td>
                        </tr>`).join('');
                })
                .catch(() => {
                    if (!silent) tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:2rem;"><div class="empty-state"><h3>Erro ao Carregar</h3><p>Não foi possível carregar as contas pendentes.</p><button class="btn btn-primary" onclick="loadPendingUsers()">Tentar Novamente</button></div></td></tr>`;
                })
                .finally(() => { _loadingPending = false; });
        }

        function _startAutoRefresh() {
            setInterval(() => {
                if (document.hidden) return;
                if (document.querySelector('.modal.show, .modal.open')) return;
                const active = document.querySelector('.tab-btn.active');
                if (active?.id === 'pendingTab') loadPendingUsers(true);
                else loadUsers(true);
            }, 10000);
        }

        function editUser(userId) {
            const token = localStorage.getItem('token');
            fetch(`/api/users/${userId}`, { headers: { 'Authorization': 'Bearer ' + token } })
                .then(r => r.json())
                .then(user => {
                    document.getElementById('editNome').value = user.nome;
                    document.getElementById('editEmail').value = user.email;
                    document.getElementById('editSenha').value = '';
                    document.getElementById('editCargo').value = user.cargo;
                    document.getElementById('editUserForm').dataset.userId = userId;
                    document.getElementById('editUserModal').classList.add('show');
                });
        }

        function closeEditModal() {
            document.getElementById('editUserModal').classList.remove('show');
        }

        async function deleteUser(userId) {
            if (!confirm('Tem certeza que deseja excluir este usuário?')) return;
            const token = localStorage.getItem('token');
            const res = await fetch(`/api/users/${userId}`, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
            if (res.ok) loadUsers();
        }

        async function approveUser(userId) {
            const token = localStorage.getItem('token');
            const cargoSelect = document.getElementById(`cargo-${userId}`);
            const cargo = cargoSelect ? cargoSelect.value : 'SONOPLASTA';

            // Atualizar cargo antes de aprovar (caso o admin tenha mudado)
            await fetch(`/api/users/${userId}/cargo`, {
                method: 'PATCH',
                headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                body: JSON.stringify({ cargo })
            });

            const res = await fetch(`/api/users/${userId}/approve`, {
                method: 'PATCH',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (res.ok) { loadPendingUsers(); loadUsers(); }
        }

        async function rejectUser(userId) {
            const token = localStorage.getItem('token');
            const res = await fetch(`/api/users/${userId}/reject`, { method: 'PATCH', headers: { 'Authorization': 'Bearer ' + token } });
            if (res.ok) loadPendingUsers();
        }

        document.getElementById('editUserForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const userId = this.dataset.userId;
            const data = Object.fromEntries(new FormData(this));
            if (!data.senha) delete data.senha;
            const token = localStorage.getItem('token');
            const res = await fetch(`/api/users/${userId}`, {
                method: 'PUT',
                headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (res.ok) { closeEditModal(); loadUsers(); }
        });

        function getCargoDisplay(c) { return { ADMIN:'Administrador', DIRETOR:'Diretor', SONOPLASTA:'Sonoplasta' }[c] || c; }
        function getCargoBadgeClass(c) { return { ADMIN:'purple', DIRETOR:'blue', SONOPLASTA:'green' }[c] || 'gray'; }
        function getStatusDisplay(s) { return { APPROVED:'Aprovado', PENDING:'Pendente', REJECTED:'Recusado' }[s] || s; }
        function getStatusBadgeClass(s) { return { APPROVED:'green', PENDING:'yellow', REJECTED:'red' }[s] || 'gray'; }
    </script>
</body>
</html>
