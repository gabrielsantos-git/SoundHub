<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload via QR Code - SoundHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .upload-container {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            color: #3b82f6;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .header p {
            color: #6b7280;
            font-size: 0.875rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #374151;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }
        .file-input-label {
            display: block;
            padding: 2rem;
            border: 2px dashed #d1d5db;
            border-radius: 0.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #f9fafb;
        }
        .file-input-label:hover {
            border-color: #3b82f6;
            background: #f0f9ff;
        }
        .file-input-label.has-file {
            border-color: #10b981;
            background: #f0fdf4;
        }
        .file-info {
            margin-top: 1rem;
            padding: 0.75rem;
            background: #f0f9ff;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            color: #374151;
        }
        .btn {
            width: 100%;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-primary:hover {
            background: #2563eb;
        }
        .btn-primary:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        .error {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }
        .success {
            color: #10b981;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 1rem;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #e5e7eb;
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 0.5rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 1rem;
        }
        .progress-fill {
            height: 100%;
            background: #3b82f6;
            transition: width 0.3s ease;
        }
        .file-list {
            margin-top: 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            background: #f9fafb;
        }
        .file-item {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            border-bottom: 1px solid #e5e7eb;
        }
        .file-item:last-child {
            border-bottom: none;
        }
        .file-icon {
            font-size: 1.5rem;
            margin-right: 0.75rem;
        }
        .file-info {
            flex: 1;
        }
        .file-name {
            font-weight: 500;
            color: #374151;
        }
        .file-size {
            font-size: 0.875rem;
            color: #6b7280;
        }
        .file-remove {
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 0.25rem;
            padding: 0.25rem 0.5rem;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .file-remove:hover {
            background: #dc2626;
        }
    </style>
</head>
<body>
    <div class="upload-container">
        <div class="header">
            <h1>Upload via QR Code</h1>
            <p>Envie seu arquivo para o SoundHub</p>
        </div>

        <form id="uploadForm">
            <div class="form-group">
                <label for="nome">Seu Nome</label>
                <input type="text" id="nome" name="nome" required placeholder="Digite seu nome">
            </div>

            <div class="form-group">
                <label for="descricao">Descrição (opcional)</label>
                <textarea id="descricao" name="descricao" rows="3" placeholder="Descreva os arquivos que está enviando..."></textarea>
            </div>

            <div class="form-group">
                <label>Arquivos (selecione múltiplos)</label>
                <div class="file-input-wrapper">
                    <input type="file" id="arquivo" name="arquivo" required accept="image/*,video/*,.pdf" multiple>
                    <label for="arquivo" class="file-input-label" id="fileLabel">
                        <div>
                            <div style="font-size: 2rem; margin-bottom: 0.5rem;">📁</div>
                            <div>Clique para selecionar arquivos</div>
                            <div style="font-size: 0.875rem; color: #6b7280; margin-top: 0.5rem;">
                                Imagens, vídeos ou PDF (máx 50MB por arquivo)
                            </div>
                        </div>
                    </label>
                </div>
                <div id="fileList" class="file-list" style="display: none;"></div>
            </div>

            <div class="progress-bar" id="progressBar" style="display: none;">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                Enviando arquivos...
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn" disabled>
                Enviar Arquivos
            </button>

            <div id="message"></div>
        </form>
    </div>

    <script>
        // === FUNÇÕES QR CODE ===
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            document.getElementById('message').innerHTML = '<div class="error">QR Code inválido ou expirado</div>';
            document.getElementById('submitBtn').disabled = true;
        }

        async function verifyQRCode() {
            if (!token) return;
            
            try {
                const response = await fetch(`/api/qr/verify/${token}`);
                const data = await response.json();
                
                if (!data.valid) {
                    document.getElementById('message').innerHTML = '<div class="error">QR Code inválido ou expirado</div>';
                    document.getElementById('submitBtn').disabled = true;
                } else {
                    document.getElementById('message').innerHTML = '<div class="success">QR Code válido! Você pode enviar seus arquivos.</div>';
                }
            } catch (error) {
                console.error('Erro ao verificar QR Code:', error);
                document.getElementById('message').innerHTML = '<div class="error">Erro ao verificar QR Code</div>';
                document.getElementById('submitBtn').disabled = true;
            }
        }

        // Verificar QR code ao carregar
        verifyQRCode();

        // Manipulação de arquivos (múltiplos)
        const fileInput = document.getElementById('arquivo');
        const fileLabel = document.getElementById('fileLabel');
        const fileList = document.getElementById('fileList');
        const submitBtn = document.getElementById('submitBtn');
        let selectedFiles = [];

        fileInput.addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            selectedFiles = [];
            
            if (files.length === 0) {
                resetFileSelection();
                return;
            }
            
            // Validar todos os arquivos
            const maxSize = 50 * 1024 * 1024;
            const allowedTypes = ['image/', 'video/', 'application/pdf'];
            let invalidFiles = [];
            
            files.forEach(file => {
                if (file.size > maxSize) {
                    invalidFiles.push(`${file.name} (muito grande)`);
                } else {
                    const isAllowed = allowedTypes.some(type => file.type.startsWith(type));
                    if (!isAllowed) {
                        invalidFiles.push(`${file.name} (tipo não permitido)`);
                    } else {
                        selectedFiles.push(file);
                    }
                }
            });
            
            if (invalidFiles.length > 0) {
                document.getElementById('message').innerHTML = `<div class="error">Arquivos inválidos: ${invalidFiles.join(', ')}</div>`;
                if (selectedFiles.length === 0) {
                    resetFileSelection();
                    return;
                }
            }
            
            // Atualizar UI
            updateFileList();
            submitBtn.disabled = selectedFiles.length === 0;
        });

        function resetFileSelection() {
            selectedFiles = [];
            fileLabel.classList.remove('has-file');
            fileLabel.innerHTML = `
                <div>
                    <div style="font-size: 2rem; margin-bottom: 0.5rem;">📁</div>
                    <div>Clique para selecionar arquivos</div>
                    <div style="font-size: 0.875rem; color: #6b7280; margin-top: 0.5rem;">
                        Imagens, vídeos ou PDF (máx 50MB por arquivo)
                    </div>
                </div>
            `;
            fileList.style.display = 'none';
            submitBtn.disabled = true;
        }

        function updateFileList() {
            if (selectedFiles.length === 0) {
                fileList.style.display = 'none';
                return;
            }
            
            // Atualizar label
            fileLabel.classList.add('has-file');
            fileLabel.innerHTML = `
                <div>
                    <div style="font-size: 2rem; margin-bottom: 0.5rem;">📁</div>
                    <div>${selectedFiles.length} arquivo(s) selecionado(s)</div>
                    <div style="font-size: 0.875rem; color: #6b7280; margin-top: 0.5rem;">
                        Clique para alterar seleção
                    </div>
                </div>
            `;
            
            // Criar lista de arquivos
            let html = '';
            selectedFiles.forEach((file, index) => {
                html += `
                    <div class="file-item">
                        <div class="file-icon">${getFileIcon(file.type)}</div>
                        <div class="file-info">
                            <div class="file-name">${file.name}</div>
                            <div class="file-size">${formatFileSize(file.size)}</div>
                        </div>
                        <button type="button" class="file-remove" onclick="removeFile(${index})">Remover</button>
                    </div>
                `;
            });
            
            fileList.innerHTML = html;
            fileList.style.display = 'block';
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            
            // Atualizar o input file
            const dataTransfer = new DataTransfer();
            selectedFiles.forEach(file => dataTransfer.items.add(file));
            fileInput.files = dataTransfer.files;
            
            updateFileList();
            submitBtn.disabled = selectedFiles.length === 0;
        }

        function getFileIcon(fileType) {
            if (fileType.startsWith('image/')) return '🖼️';
            if (fileType.startsWith('video/')) return '🎥';
            if (fileType === 'application/pdf') return '📄';
            return '📁';
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function resetFileInput() {
            fileLabel.classList.remove('has-file');
            fileLabel.innerHTML = `
                <div>
                    <div style="font-size: 2rem; margin-bottom: 0.5rem;"></div>
                    <div>Clique para selecionar um arquivo</div>
                    <div style="font-size: 0.875rem; color: #6b7280; margin-top: 0.5rem;">
                        Imagens, vídeos ou PDF (máx 50MB)
                    </div>
                </div>
            `;
            fileList.style.display = 'none';
            checkFormValidity();
        }

        function checkFormValidity() {
            const nome = document.getElementById('nome').value.trim();
            
            submitBtn.disabled = !(nome && selectedFiles.length > 0 && token);
        }

        // Verificar validade do formulário
        document.getElementById('nome').addEventListener('input', checkFormValidity);

        // Envio do formulário
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!token) {
                document.getElementById('message').innerHTML = '<div class="error">QR Code inválido</div>';
                return;
            }
            
            const formData = new FormData();
            formData.append('nome', document.getElementById('nome').value);
            formData.append('descricao', document.getElementById('descricao').value);
            formData.append('token', token);
            
            // Adicionar múltiplos arquivos
            selectedFiles.forEach(file => {
                formData.append('arquivos', file);
            });
            
            // Mostrar loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('progressBar').style.display = 'block';
            submitBtn.disabled = true;
            document.getElementById('message').innerHTML = '';
            
            try {
                const xhr = new XMLHttpRequest();
                
                // Progress upload
                xhr.upload.addEventListener('progress', function(e) {
                    try {
                        if (e.lengthComputable) {
                            const percentComplete = (e.loaded / e.total) * 100;
                            const progressFill = document.getElementById('progressFill');
                            if (progressFill) {
                                progressFill.style.width = percentComplete + '%';
                            }
                        }
                    } catch (progressError) {
                        console.warn('Erro no progresso do upload:', progressError);
                    }
                });
                
                xhr.addEventListener('load', function() {
                    try {
                        const loading = document.getElementById('loading');
                        const progressBar = document.getElementById('progressBar');
                        if (loading) loading.style.display = 'none';
                        if (progressBar) progressBar.style.display = 'none';
                        
                        if (xhr.status === 200) {
                            try {
                                const response = JSON.parse(xhr.responseText);
                                const message = document.getElementById('message');
                                if (message) {
                                    message.innerHTML = `<div class="success">${response.message || 'Arquivos enviados com sucesso! Aguardando aprovação.'}</div>`;
                                }
                                
                                const uploadForm = document.getElementById('uploadForm');
                                if (uploadForm) uploadForm.reset();
                                resetFileInput();
                                
                                // Limpar seleção de arquivos
                                selectedFiles = [];
                                updateFileList();
                                if (submitBtn) submitBtn.disabled = true;
                            } catch (parseError) {
                                console.error('Erro ao parsear resposta sucesso:', parseError);
                                const message = document.getElementById('message');
                                if (message) {
                                    message.innerHTML = '<div class="error">Erro ao processar resposta do servidor</div>';
                                }
                                if (submitBtn) submitBtn.disabled = false;
                            }
                        } else {
                            try {
                                const error = JSON.parse(xhr.responseText);
                                const message = document.getElementById('message');
                                if (message) {
                                    message.innerHTML = `<div class="error">${error.error || 'Erro ao enviar arquivos'}</div>`;
                                }
                            } catch (parseError) {
                                console.error('Erro ao parsear resposta erro:', parseError);
                                const message = document.getElementById('message');
                                if (message) {
                                    message.innerHTML = '<div class="error">Erro ao enviar arquivos</div>';
                                }
                            }
                            if (submitBtn) submitBtn.disabled = false;
                        }
                    } catch (loadError) {
                        console.error('Erro no listener de load:', loadError);
                        const loading = document.getElementById('loading');
                        const progressBar = document.getElementById('progressBar');
                        if (loading) loading.style.display = 'none';
                        if (progressBar) progressBar.style.display = 'none';
                        if (submitBtn) submitBtn.disabled = false;
                    }
                });
                
                xhr.addEventListener('error', function() {
                    try {
                        const loading = document.getElementById('loading');
                        const progressBar = document.getElementById('progressBar');
                        const message = document.getElementById('message');
                        
                        if (loading) loading.style.display = 'none';
                        if (progressBar) progressBar.style.display = 'none';
                        if (message) {
                            message.innerHTML = '<div class="error">Erro de conexão. Tente novamente.</div>';
                        }
                        if (submitBtn) submitBtn.disabled = false;
                    } catch (errorError) {
                        console.error('Erro no listener de error:', errorError);
                        if (submitBtn) submitBtn.disabled = false;
                    }
                });
                
                // Adicionar listener para abort para limpeza completa
                xhr.addEventListener('abort', function() {
                    try {
                        const loading = document.getElementById('loading');
                        const progressBar = document.getElementById('progressBar');
                        
                        if (loading) loading.style.display = 'none';
                        if (progressBar) progressBar.style.display = 'none';
                        if (submitBtn) submitBtn.disabled = false;
                    } catch (abortError) {
                        console.error('Erro no listener de abort:', abortError);
                    }
                });
                
                xhr.open('POST', '/api/files/upload');
                xhr.send(formData);
                
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('progressBar').style.display = 'none';
                document.getElementById('message').innerHTML = '<div class="error">Erro ao enviar arquivo</div>';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
