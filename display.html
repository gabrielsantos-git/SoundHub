<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Projeção - SoundHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .projection-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .projection-content {
            max-width: 100%;
            max-height: 100%;
            position: relative;
        }

        .projection-content img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .projection-content video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .projection-content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .loading {
            text-align: center;
            color: #666;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #333;
            border-top: 3px solid #666;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 14px;
            display: none;
        }

        .controls-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            display: none;
            gap: 10px;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .media-info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 14px;
            display: none;
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
        }

        .progress-fill {
            height: 100%;
            background: #3b82f6;
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="projection-container">
        <div class="projection-content" id="projectionContent">
            <div class="loading">
                <div class="loading-spinner"></div>
                <div>Aguardando conteúdo...</div>
            </div>
        </div>
        <div class="status-overlay" id="statusOverlay">
            <span id="statusText">Pronto</span>
        </div>
        <div class="media-info" id="mediaInfo">
            <div id="mediaTitle">Nenhuma mídia</div>
        </div>
        <div class="controls-overlay" id="controlsOverlay">
            <button class="control-btn" onclick="toggleFullscreen()">Tela Cheia</button>
            <button class="control-btn" onclick="stopProjection()">Parar</button>
        </div>
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = null;
        let currentMedia = null;
        let isProjecting = false;
        let isPlaying = false;
        let currentVolume = 100;

        // Inicializar
        document.addEventListener('DOMContentLoaded', function() {
            initSocket();
            
            // Verificar se deve iniciar em tela cheia
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('fullscreen') === 'true') {
                requestFullscreen();
            }
            
            // Mostrar controles ao mover o mouse
            let hideControlsTimeout;
            document.addEventListener('mousemove', showControls);
            document.addEventListener('mousemove', () => {
                clearTimeout(hideControlsTimeout);
                hideControlsTimeout = setTimeout(hideControls, 3000);
            });
            
            // Teclas de atalho
            document.addEventListener('keydown', handleKeyPress);
        });

        // Conectar ao WebSocket
        function initSocket() {
            socket = io();
            
            socket.on('connect', () => {
                console.log('Conectado ao WebSocket');
                updateStatus('Conectado');
                const screenId = getScreenId();
                socket.emit('join-display', screenId);
            });
            
            socket.on('disconnect', () => {
                console.log('Desconectado do WebSocket');
                updateStatus('Desconectado');
            });
            
            socket.on('project-file', (data) => {
                displayMedia(data.file);
            });
            
            socket.on('stop-display', () => {
                stopProjection();
            });
        }

        function updateStatus(connected, message) {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const debugStatus = document.getElementById('debugStatus');

            if (connected) {
                statusDot.classList.remove('disconnected');
                statusText.textContent = message;
                debugStatus.textContent = message;
            } else {
                statusDot.classList.add('disconnected');
                statusText.textContent = message;
                debugStatus.textContent = message;
            }
        }

        function displayContent(file) {
            const waitingScreen = document.getElementById('waitingScreen');
            const contentContainer = document.getElementById('contentContainer');
            const debugFile = document.getElementById('debugFile');

            // Atualizar debug
            debugFile.textContent = file.name;

            // Limpar conteúdo anterior
            contentContainer.innerHTML = '';

            // Determinar tipo de conteúdo
            if (file.type.includes('image')) {
                contentContainer.innerHTML = `<img src="${file.url}" alt="${file.name}" />`;
            } else if (file.type.includes('video')) {
                contentContainer.innerHTML = `
                    <video controls autoplay>
                        <source src="${file.url}" type="${file.type}">
                        Seu navegador não suporta reprodução de vídeo.
                    </video>
                `;
            } else if (file.type.includes('pdf')) {
                contentContainer.innerHTML = `<iframe src="${file.url}" />`;
            } else {
                contentContainer.innerHTML = `
                    <div class="error-message">
                        <h2>❌ Tipo Não Suportado</h2>
                        <p>Tipo de arquivo não suportado para projeção</p>
                    </div>
                `;
            }

            // Mostrar conteúdo e esconder tela de espera
            waitingScreen.style.display = 'none';
            contentContainer.style.display = 'flex';

            updateStatus(true, 'Exibindo conteúdo');
        }

        function stopDisplay() {
            const waitingScreen = document.getElementById('waitingScreen');
            const contentContainer = document.getElementById('contentContainer');
            const debugFile = document.getElementById('debugFile');

            // Limpar debug
            debugFile.textContent = 'Nenhum';

            // Esconder conteúdo e mostrar tela de espera
            contentContainer.style.display = 'none';
            waitingScreen.style.display = 'block';

            updateStatus(true, 'Aguardando conteúdo...');
        }

        // Tratar erros de carregamento de mídia
        document.addEventListener('error', function(e) {
            if (e.target.tagName === 'IMG' || e.target.tagName === 'VIDEO') {
                console.error('Erro ao carregar mídia:', e.target.src);
                stopDisplay();
            }
        }, true);

        // Teclas de atalho
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                // ESC para parar projeção (em desenvolvimento)
                if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                    stopDisplay();
                }
            }
        });

        // Prevenir menu de contexto
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // Prevenir seleção de texto
        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
