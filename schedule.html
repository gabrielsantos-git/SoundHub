<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/assets/SounHub-03.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escalas - SoundHub</title>
    <link rel="stylesheet" href="/css/sidebar.css">
    <link rel="stylesheet" href="/css/schedule.css">
</head>
<body>
    <!-- Sidebar unificada será injetada pelo sidebar.js -->
    <script src="sidebar.js"></script>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Abas -->
        <div class="card">
            <div class="card-header">
                <h1 class="card-title">Gerenciar Escalas</h1>
                <div id="adminActions" style="display: none;">
<button class="btn btn-success" onclick="openCreateEventModal()">
                       <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-plus-circle" viewBox="0 0 16 16">
                        <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
                        <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4"/>
                        </svg> Novo evento
                    </button>
                </div>
            </div>
            <div class="card-content">
                <div style="display: flex; gap: 1rem; border-bottom: 1px solid #e5e7eb; margin-bottom: 1rem;">
                    <button class="tab-btn active" onclick="switchTab('schedules')" id="schedulesTab">
                        Escalas semanais
                    </button>
                    <button class="tab-btn" onclick="switchTab('events')" id="eventsTab">
                        Escalas de eventos
                    </button>
                </div>

                <!-- Conteúdo das Abas -->
                <div id="schedulesContent" class="tab-content active">
                    <div id="schedulesList">
                        <div class="loading">
                            <div class="spinner"></div>
                            <div>Carregando escalas...</div>
                        </div>
                    </div>
                </div>

                <div id="eventsContent" class="tab-content">
                    <div id="eventsList">
                        <div class="loading">
                            <div class="spinner"></div>
                            <div>Carregando eventos...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Criar Escala -->
    <div class="modal" id="createScheduleModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Criar Nova Escala</h2>
                <button class="close-btn" onclick="closeCreateScheduleModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p style="color: #374151; font-size: 0.95rem;">
                    A escala do mês atual será criada automaticamente com os dias fixos:
                </p>
                <ul style="margin: 1rem 0 0 1.5rem; color: #3b82f6; font-weight: 500;">
                    <li>Sábado</li>
                    <li>Domingo</li>
                    <li>Quarta-feira</li>
                </ul>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeCreateScheduleModal()">
                    Cancelar
                </button>
                <button type="button" class="btn btn-primary" onclick="createSchedule()">
                    Criar Escala
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Criar Evento -->
    <div class="modal" id="createEventModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Criar Novo Evento</h2>
                <button class="close-btn" onclick="closeCreateEventModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="createEventForm">
                    <div class="form-group">
                        <label class="form-label" for="eventName">Nome do Evento</label>
                        <input type="text" id="eventName" name="nome" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="eventDescription">Descrição</label>
                        <textarea id="eventDescription" name="descricao" class="form-input" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="eventStartDate">Data de Início</label>
                        <input type="date" id="eventStartDate" name="data_inicio" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="eventEndDate">Data de Término</label>
                        <input type="date" id="eventEndDate" name="data_fim" class="form-input" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeCreateEventModal()">
                    Cancelar
                </button>
                <button type="button" class="btn btn-primary" onclick="submitCreateEvent()">
                    Criar Evento
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Editar Evento -->
    <div class="modal" id="editEventModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Editar Evento</h2>
                <button class="close-btn" onclick="closeEditEventModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="editEventForm">
                    <input type="hidden" id="editEventId">
                    <div class="form-group">
                        <label class="form-label" for="editEventName">Nome do Evento</label>
                        <input type="text" id="editEventName" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="editEventDescription">Descrição</label>
                        <textarea id="editEventDescription" class="form-input" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="editEventStartDate">Data de Início</label>
                        <input type="date" id="editEventStartDate" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="editEventEndDate">Data de Término</label>
                        <input type="date" id="editEventEndDate" class="form-input" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeEditEventModal()">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="submitEditEvent()">Salvar Alterações</button>
            </div>
        </div>
    </div>

    <!-- Modal Editar Escala -->
    <div class="modal" id="editScheduleModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Editar Escala</h2>
                <button class="close-btn" onclick="closeEditScheduleModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="editScheduleContent">
                    <div class="loading">
                        <div class="spinner"></div>
                        <div>Carregando escala...</div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeEditScheduleModal()">
                    Cancelar
                </button>
                <button type="button" class="btn btn-primary" onclick="saveSchedule()">
                    Salvar Alterações
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="navigation.js"></script>
    <script>
        let currentUser = null;
        let currentSchedule = null;
        let availableUsers = [];

        // Verificar autenticação ao carregar
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
        });

        async function checkAuth() {
            const token = localStorage.getItem('token');
            
            if (!token) {
                window.location.href = '/auth';
                return;
            }
            
            try {
                const response = await fetch('/api/auth/me', {
                    cache: 'no-store',
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    currentUser = data.user;
                    updateUserInterface();
                    
                    // Verificar permissão
                    if (currentUser.cargo !== 'DIRETOR' && currentUser.cargo !== 'ADMIN' && currentUser.cargo !== 'SONOPLASTA') {
                        window.location.href = '/auth';
                        return;
                    }
                    
                    // Mostrar ações de admin apenas para ADMIN/DIRETOR
                    if (currentUser.cargo === 'ADMIN' || currentUser.cargo === 'DIRETOR') {
                        document.getElementById('adminActions').style.display = 'flex';
                    }
                    
                    // Carregar dados
                    loadSchedules();
                    loadEvents();
                    loadAvailableUsers();
                    _startAutoRefresh();
                } else {
                    localStorage.removeItem('token');
                    window.location.href = '/auth';
                }
            } catch (error) {
                console.error('Erro ao verificar autenticação:', error);
                window.location.href = '/auth';
            }
        }

        function updateUserInterface() {
            if (!currentUser) return;
            
            const userNameEl = document.getElementById('userName');
            const userRoleEl = document.getElementById('userRole');
            
            if (userNameEl) {
                userNameEl.textContent = currentUser.nome;
            }
            
            if (userRoleEl) {
                userRoleEl.textContent = getCargoDisplay(currentUser.cargo);
            }
            
            // Sidebar gerenciada pelo sidebar.js
            if (typeof updateSidebar === 'function') updateSidebar(currentUser);
            if (typeof window.iniciarPushNotifications === 'function') window.iniciarPushNotifications(token);
        }

        function getCargoDisplay(cargo) {
            switch (cargo) {
                case 'ADMIN':
                    return 'Administrador';
                case 'DIRETOR':
                    return 'Diretor';
                case 'SONOPLASTA':
                    return 'Sonoplasta';
                default:
                    return cargo;
            }
        }

        function switchTab(tab) {
            // Atualizar botões das abas
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
            
            // Atualizar conteúdo das abas
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tab + 'Content').classList.add('active');
        }

        // Funções de Modal
        function openCreateScheduleModal() {
            document.getElementById('createScheduleModal').classList.add('open');
        }

        function closeCreateScheduleModal() {
            document.getElementById('createScheduleModal').classList.remove('open');
            document.getElementById('createScheduleForm').reset();
        }

        function openCreateEventModal() {
            document.getElementById('createEventModal').classList.add('open');
        }

        function closeCreateEventModal() {
            document.getElementById('createEventModal').classList.remove('open');
            document.getElementById('createEventForm').reset();
        }

        async function openEditScheduleModal(scheduleId) {
            currentSchedule = scheduleId;
            await loadAvailableUsers();
            document.getElementById('editScheduleModal').classList.add('open');
            loadScheduleForEdit(scheduleId);
        }

        function closeEditScheduleModal() {
            document.getElementById('editScheduleModal').classList.remove('open');
            currentSchedule = null;
        }

        // Funções de Carregamento
        let _loadingSchedules = false;
        let _loadingEvents = false;

        async function loadSchedules(silent = false) {
            if (_loadingSchedules) return;
            _loadingSchedules = true;
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/schedules', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (response.ok) {
                    const schedules = await response.json();
                    displaySchedules(schedules);
                }
            } catch (error) {
                // falha silenciosa no auto-refresh
            } finally {
                _loadingSchedules = false;
            }
        }

        async function loadEvents(silent = false) {
            if (_loadingEvents) return;
            _loadingEvents = true;
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/events', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (response.ok) {
                    const events = await response.json();
                    displayEvents(events);
                }
            } catch (error) {
                // falha silenciosa no auto-refresh
            } finally {
                _loadingEvents = false;
            }
        }

        function _startAutoRefresh() {
            setInterval(() => {
                if (document.hidden) return;
                if (document.querySelector('.modal.open, .modal.show')) return;
                const activeTab = document.querySelector('.tab-btn.active');
                if (activeTab?.id === 'eventsTab') loadEvents(true);
                else loadSchedules(true);
                // Manter lista de usuários sempre atualizada
                loadAvailableUsers();
            }, 15000);
        }

        async function loadAvailableUsers() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/users', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (response.ok) {
                    const users = await response.json();
                    // Apenas sonoplastas e diretores aparecem nas escalas
                    availableUsers = users.filter(u =>
                        u.status === 'APPROVED' &&
                        (u.cargo === 'SONOPLASTA' || u.cargo === 'DIRETOR')
                    );
                }
            } catch (error) {}
        }

        // Funções de Exibição
        function displaySchedules(schedules) {
            const container = document.getElementById('schedulesList');
            
            if (schedules.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>Nenhuma escala encontrada</h3>
                        <p>Crie sua primeira escala para começar.</p>
                    </div>
                `;
                return;
            }
            
            const schedulesHTML = schedules.map(schedule => `
                <div class="schedule-day">
                    <div class="schedule-day-header">
                        <div class="schedule-day-title">
                            <strong>${schedule.nome}</strong>
                            <span class="badge badge-blue">${schedule.tipo}</span>
                        </div>
                        <div>
                            ${currentUser.cargo === 'ADMIN' || currentUser.cargo === 'DIRETOR' ?
                                `<div class="dropdown-wrapper">
                                    <button class="btn btn-secondary moreOptionGE" onclick="toggleDropdown(event, ${schedule.id})">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-three-dots-vertical" viewBox="0 0 16 16">
                                        <path d="M9.5 13a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0m0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0m0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0"/>
                                        </svg>
                                    </button>
                                    <div class="dropdown-menu" id="dropdown-${schedule.id}">
                                        <button class="dropdown-item" onclick="closeAllDropdowns(); openEditScheduleModal(${schedule.id})">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pencil" viewBox="0 0 16 16">
                                            <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325"/>
                                            </svg>
                                            Editar
                                        </button>
                                        <button class="dropdown-item dropdown-item-danger" onclick="closeAllDropdowns(); deleteSchedule(${schedule.id})">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash" viewBox="0 0 16 16">
                                            <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
                                            <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
                                            </svg>
                                            Excluir
                                        </button>
                                    </div>
                                </div>` : ''}
                        </div>
                    </div>
                    <div>
                        <p><strong>Período:</strong> ${formatDate(schedule.data_inicio)} a ${formatDate(schedule.data_fim)}</p>
                        <div id="scheduleDays-${schedule.id}">
                            <div class="loading">Carregando dias...</div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = schedulesHTML;
            
            // Carregar dias de cada escala
            schedules.forEach(schedule => {
                loadScheduleDays(schedule.id);
            });
        }

        function displayEvents(events) {
            const container = document.getElementById('eventsList');
            
            if (events.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>Nenhum evento encontrado</h3>
                        <p>Crie seu primeiro evento para começar.</p>
                    </div>
                `;
                return;
            }
            
            const eventsHTML = events.map(event => `
                <div class="schedule-day">
                    <div class="schedule-day-header">
                        <div class="schedule-day-title">
                            <strong>${event.nome}</strong>
                            <span class="badge badge-green">Evento</span>
                        </div>
                        <div>
                            ${currentUser.cargo === 'ADMIN' || currentUser.cargo === 'DIRETOR' ?
                                `<div class="dropdown-wrapper">
                                    <button class="btn btn-secondary moreOptionGE" onclick="toggleDropdown(event, 'ev-${event.id}')">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-three-dots-vertical" viewBox="0 0 16 16">
                                        <path d="M9.5 13a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0m0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0m0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0"/>
                                        </svg>
                                    </button>
                                    <div class="dropdown-menu" id="dropdown-ev-${event.id}">
                                        <button class="dropdown-item" onclick="closeAllDropdowns(); openEditEventModal(${event.id})">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325z"/></svg>
                                            Editar
                                        </button>
                                        <button class="dropdown-item dropdown-item-danger" onclick="closeAllDropdowns(); deleteEvent(${event.id})">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/><path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/></svg>
                                            Excluir
                                        </button>
                                    </div>
                                </div>` : ''}
                        </div>
                    </div>
                    <div>
                        <p><strong>Período:</strong> ${formatDate(event.data_inicio)} a ${formatDate(event.data_fim)}</p>
                        ${event.descricao ? `<p><strong>Descrição:</strong> ${event.descricao}</p>` : ''}
                        <div id="eventDays-${event.id}">
                            <div class="loading">Carregando dias...</div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = eventsHTML;
            
            // Carregar dias de cada evento
            events.forEach(event => {
                loadEventDays(event.id);
            });
        }

        async function loadScheduleDays(scheduleId) {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/api/schedules/${scheduleId}/days`, {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (response.ok) {
                    const days = await response.json();
                    displayScheduleDays(scheduleId, days);
                }
            } catch (error) {
                console.error('Erro ao carregar dias da escala:', error);
            }
        }

        async function loadEventDays(eventId) {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/api/events/${eventId}/days`, {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (response.ok) {
                    const days = await response.json();
                    displayEventDays(eventId, days);
                }
            } catch (error) {
                console.error('Erro ao carregar dias do evento:', error);
            }
        }

        function displayScheduleDays(scheduleId, days) {
            const container = document.getElementById(`scheduleDays-${scheduleId}`);
            
            if (days.length === 0) {
                container.innerHTML = '<p><em>Nenhum dia configurado</em></p>';
                return;
            }
            
            const daysHTML = days.map(day => `
                <div class="schedule-user">
                    <strong>${getDayDisplay(day.dia_semana)}${day.data_especifica ? ` (${formatDate(day.data_especifica)})` : ''}:</strong>
                    ${day.usuario_nome}
                </div>
            `).join('');
            
            container.innerHTML = daysHTML;
        }

        function displayEventDays(eventId, days) {
            const container = document.getElementById(`eventDays-${eventId}`);
            
            if (days.length === 0) {
                container.innerHTML = '<p><em>Nenhum dia configurado</em></p>';
                return;
            }
            
            const daysHTML = days.map(day => `
                <div class="schedule-user">
                    <strong>${formatDate(day.data_especifica)} (${getDayDisplay(day.dia_semana)}):</strong>
                    ${day.usuario_nome}
                </div>
            `).join('');
            
            container.innerHTML = daysHTML;
        }

        // Funções de Criação
        async function createSchedule() {
            const data = {}; // dias são fixos no servidor (sábado, domingo, quarta)
            
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/schedules', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    console.log('Escala mensal criada com sucesso!');
                    closeCreateScheduleModal();
                    loadSchedules();
                } else {
                    const error = await response.json();
                    console.log(error.error || 'Erro ao criar escala');
                }
            } catch (error) {
                console.error('Erro ao criar escala:', error);
                console.log('Erro de conexão ao criar escala');
            }
        }

        async function submitCreateEvent() {
            const form = document.getElementById('createEventForm');
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);

            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/events', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    closeCreateEventModal();
                    loadEvents();
                } else {
                    const err = await response.json();
                    alert(err.error || 'Erro ao criar evento');
                }
            } catch (error) {
                alert('Erro de conexão ao criar evento');
            }
        }

        // Funções de Edição
        async function loadScheduleForEdit(scheduleId) {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/api/schedules/${scheduleId}`, {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (response.ok) {
                    const schedule = await response.json();
                    displayEditSchedule(schedule);
                }
            } catch (error) {
                console.error('Erro ao carregar escala para edição:', error);
            }
        }

        function displayEditSchedule(schedule) {
            const container = document.getElementById('editScheduleContent');
            
            const daysHTML = schedule.dias.map(day => `
                <div class="form-group">
                    <label class="form-label">${getDayDisplay(day.dia_semana)}${day.data_especifica ? ` (${formatDate(day.data_especifica)})` : ''}</label>
                    <select class="form-input" data-day-id="${day.id}" data-dia="${day.dia_semana}">
                        <option value="">Selecione um usuário</option>
                        ${availableUsers.map(user => `
                            <option value="${user.id}" ${user.id === day.usuario_id ? 'selected' : ''}>
                                ${user.nome}
                            </option>
                        `).join('')}
                    </select>
                </div>
            `).join('');
            
            container.innerHTML = daysHTML;
        }

        async function saveSchedule() {
            if (!currentSchedule) return;
            
            const selects = document.querySelectorAll('#editScheduleContent select');
            const updates = [];
            
            selects.forEach(select => {
                const dayId = select.dataset.dayId;
                const userId = select.value;
                
                if (userId) {
                    updates.push({
                        id: dayId,
                        usuario_id: userId
                    });
                }
            });
            
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/api/schedules/${currentSchedule}/days`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ days: updates })
                });
                
                if (response.ok) {
                    console.log('Escala atualizada com sucesso!');
                    closeEditScheduleModal();
                    loadSchedules();
                } else {
                    const error = await response.json();
                    console.log(error.error || 'Erro ao atualizar escala');
                }
            } catch (error) {
                console.error('Erro ao atualizar escala:', error);
                console.log('Erro de conexão ao atualizar escala');
            }
        }

        // Funções Utilitárias
        function formatDate(dateString) {
            if (!dateString) return '';
            // Divide a string "YYYY-MM-DD" diretamente — evita conversão UTC→local
            const [ano, mes, dia] = dateString.split('-');
            return `${dia}/${mes}/${ano}`;
        }

        function getDayDisplay(day) {
            const days = {
                'segunda': 'Segunda-feira',
                'terca': 'Terça-feira',
                'quarta': 'Quarta-feira',
                'quinta': 'Quinta-feira',
                'sexta': 'Sexta-feira',
                'sabado': 'Sábado',
                'domingo': 'Domingo'
            };
            return days[day] || day;
        }

        function toggleDropdown(event, id) {
            event.stopPropagation();
            const menu = document.getElementById(`dropdown-${id}`);
            const isOpen = menu.classList.contains('open');
            closeAllDropdowns();
            if (!isOpen) menu.classList.add('open');
        }

        function closeAllDropdowns() {
            document.querySelectorAll('.dropdown-menu.open').forEach(m => m.classList.remove('open'));
        }

        document.addEventListener('click', closeAllDropdowns);

        async function deleteEvent(eventId) {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/api/events/${eventId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (response.ok) {
                    loadEvents();
                }
            } catch (error) {
                console.error('Erro ao excluir evento:', error);
            }
        }

        async function openEditEventModal(eventId) {
            await loadAvailableUsers();
            document.getElementById('editEventModal').classList.add('open');
            loadEventForEdit(eventId);
        }

        function closeEditEventModal() {
            document.getElementById('editEventModal').classList.remove('open');
            document.getElementById('editEventForm').reset();
        }

        async function loadEventForEdit(eventId) {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/api/events/${eventId}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (response.ok) {
                    const event = await response.json();
                    document.getElementById('editEventId').value = event.id;
                    document.getElementById('editEventName').value = event.nome;
                    document.getElementById('editEventDescription').value = event.descricao || '';
                    document.getElementById('editEventStartDate').value = event.data_inicio;
                    document.getElementById('editEventEndDate').value = event.data_fim;
                }
            } catch (error) {
                alert('Erro ao carregar evento');
            }
        }

        async function submitEditEvent() {
            const id = document.getElementById('editEventId').value;
            const data = {
                nome: document.getElementById('editEventName').value,
                descricao: document.getElementById('editEventDescription').value,
                data_inicio: document.getElementById('editEventStartDate').value,
                data_fim: document.getElementById('editEventEndDate').value,
            };
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/api/events/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify(data)
                });
                if (response.ok) {
                    closeEditEventModal();
                    loadEvents();
                } else {
                    const err = await response.json();
                    alert(err.error || 'Erro ao salvar evento');
                }
            } catch (error) {
                alert('Erro de conexão ao salvar evento');
            }
        }

        async function deleteSchedule(scheduleId) {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/api/schedules/${scheduleId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (response.ok) {
                    loadSchedules();
                }
            } catch (error) {
                console.error('Erro ao excluir escala:', error);
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
        }

        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.remove('open');
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/auth';
        }
    </script>
</body>
</html>
