<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escalas - SoundHub</title>
    <link rel="stylesheet" href="/css/schedule.css">
</head>
<body>
    <!-- Sidebar unificada será injetada pelo sidebar.js -->
    <script src="sidebar.js"></script>

    <!-- Header -->
    <header class="header">
        <div class="logo">🎵 SoundHub</div>
        <div class="user-info">
            <span id="userName">Carregando...</span>
            <span id="userRole" class="user-role">...</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Abas -->
        <div class="card">
            <div class="card-header">
                <h1 class="card-title">Gerenciar Escalas</h1>
                <div id="adminActions" style="display: none;">
<button class="btn btn-success" onclick="openCreateEventModal()">
                        🎉 Novo Evento
                    </button>
                </div>
            </div>
            <div class="card-content">
                <div style="display: flex; gap: 1rem; border-bottom: 1px solid #e5e7eb; margin-bottom: 1rem;">
                    <button class="tab-btn active" onclick="switchTab('schedules')" id="schedulesTab">
                        Escalas Semanais
                    </button>
                    <button class="tab-btn" onclick="switchTab('events')" id="eventsTab">
                        Escalas de Eventos
                    </button>
                </div>

                <!-- Conteúdo das Abas -->
                <div id="schedulesContent" class="tab-content active">
                    <div id="schedulesList">
                        <div class="loading">
                            <div class="spinner"></div>
                            <div>Carregando escalas...</div>
                        </div>
                    </div>
                </div>

                <div id="eventsContent" class="tab-content">
                    <div id="eventsList">
                        <div class="loading">
                            <div class="spinner"></div>
                            <div>Carregando eventos...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Criar Escala -->
    <div class="modal" id="createScheduleModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Criar Nova Escala</h2>
                <button class="close-btn" onclick="closeCreateScheduleModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p style="color: #374151; font-size: 0.95rem;">
                    A escala do mês atual será criada automaticamente com os dias fixos:
                </p>
                <ul style="margin: 1rem 0 0 1.5rem; color: #3b82f6; font-weight: 500;">
                    <li>Sábado</li>
                    <li>Domingo</li>
                    <li>Quarta-feira</li>
                </ul>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeCreateScheduleModal()">
                    Cancelar
                </button>
                <button type="button" class="btn btn-primary" onclick="createSchedule()">
                    Criar Escala
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Criar Evento -->
    <div class="modal" id="createEventModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Criar Novo Evento</h2>
                <button class="close-btn" onclick="closeCreateEventModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="createEventForm">
                    <div class="form-group">
                        <label class="form-label" for="eventName">Nome do Evento</label>
                        <input type="text" id="eventName" name="nome" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="eventDescription">Descrição</label>
                        <textarea id="eventDescription" name="descricao" class="form-input" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="eventStartDate">Data de Início</label>
                        <input type="date" id="eventStartDate" name="data_inicio" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="eventEndDate">Data de Término</label>
                        <input type="date" id="eventEndDate" name="data_fim" class="form-input" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeCreateEventModal()">
                    Cancelar
                </button>
                <button type="button" class="btn btn-primary" onclick="submitCreateEvent()">
                    Criar Evento
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Editar Escala -->
    <div class="modal" id="editScheduleModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Editar Escala</h2>
                <button class="close-btn" onclick="closeEditScheduleModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="editScheduleContent">
                    <div class="loading">
                        <div class="spinner"></div>
                        <div>Carregando escala...</div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeEditScheduleModal()">
                    Cancelar
                </button>
                <button type="button" class="btn btn-primary" onclick="saveSchedule()">
                    Salvar Alterações
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="navigation.js"></script>
    <script>
        let currentUser = null;
        let currentSchedule = null;
        let availableUsers = [];

        // Verificar autenticação ao carregar
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
        });

        async function checkAuth() {
            const token = localStorage.getItem('token');
            
            if (!token) {
                window.location.href = '/auth';
                return;
            }
            
            try {
                const response = await fetch('/api/auth/me', {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    currentUser = data.user;
                    updateUserInterface();
                    
                    // Verificar permissão
                    if (currentUser.cargo !== 'DIRETOR' && currentUser.cargo !== 'ADMIN' && currentUser.cargo !== 'SONOPLASTA') {
                        window.location.href = '/auth';
                        return;
                    }
                    
                    // Mostrar ações de admin apenas para ADMIN/DIRETOR
                    if (currentUser.cargo === 'ADMIN' || currentUser.cargo === 'DIRETOR') {
                        document.getElementById('adminActions').style.display = 'flex';
                    }
                    
                    // Carregar dados
                    loadSchedules();
                    loadEvents();
                    loadAvailableUsers();
                } else {
                    localStorage.removeItem('token');
                    window.location.href = '/auth';
                }
            } catch (error) {
                console.error('Erro ao verificar autenticação:', error);
                window.location.href = '/auth';
            }
        }

        function updateUserInterface() {
            if (!currentUser) return;
            
            const userNameEl = document.getElementById('userName');
            const userRoleEl = document.getElementById('userRole');
            
            if (userNameEl) {
                userNameEl.textContent = currentUser.nome;
            }
            
            if (userRoleEl) {
                userRoleEl.textContent = getCargoDisplay(currentUser.cargo);
            }
            
            // Sidebar gerenciada pelo sidebar.js
            if (typeof updateSidebar === 'function') updateSidebar(currentUser);
        }

        function getCargoDisplay(cargo) {
            switch (cargo) {
                case 'ADMIN':
                    return 'Administrador';
                case 'DIRETOR':
                    return 'Diretor';
                case 'SONOPLASTA':
                    return 'Sonoplasta';
                default:
                    return cargo;
            }
        }

        function switchTab(tab) {
            // Atualizar botões das abas
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
            
            // Atualizar conteúdo das abas
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tab + 'Content').classList.add('active');
        }

        // Funções de Modal
        function openCreateScheduleModal() {
            document.getElementById('createScheduleModal').classList.add('open');
        }

        function closeCreateScheduleModal() {
            document.getElementById('createScheduleModal').classList.remove('open');
            document.getElementById('createScheduleForm').reset();
        }

        function openCreateEventModal() {
            document.getElementById('createEventModal').classList.add('open');
        }

        function closeCreateEventModal() {
            document.getElementById('createEventModal').classList.remove('open');
            document.getElementById('createEventForm').reset();
        }

        function openEditScheduleModal(scheduleId) {
            currentSchedule = scheduleId;
            document.getElementById('editScheduleModal').classList.add('open');
            loadScheduleForEdit(scheduleId);
        }

        function closeEditScheduleModal() {
            document.getElementById('editScheduleModal').classList.remove('open');
            currentSchedule = null;
        }

        // Funções de Carregamento
        async function loadSchedules() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/schedules', {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (response.ok) {
                    const schedules = await response.json();
                    displaySchedules(schedules);
                } else {
                    console.error('Erro ao carregar escalas:', response.status);
                }
            } catch (error) {
                console.error('Erro ao carregar escalas:', error);
            }
        }

        async function loadEvents() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/events', {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (response.ok) {
                    const events = await response.json();
                    displayEvents(events);
                } else {
                    console.error('Erro ao carregar eventos:', response.status);
                }
            } catch (error) {
                console.error('Erro ao carregar eventos:', error);
            }
        }

        async function loadAvailableUsers() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/users', {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (response.ok) {
                    const users = await response.json();
                    availableUsers = users.filter(user => user.status === 'APPROVED');
                }
            } catch (error) {
                console.error('Erro ao carregar usuários:', error);
            }
        }

        // Funções de Exibição
        function displaySchedules(schedules) {
            const container = document.getElementById('schedulesList');
            
            if (schedules.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>Nenhuma escala encontrada</h3>
                        <p>Crie sua primeira escala para começar.</p>
                    </div>
                `;
                return;
            }
            
            const schedulesHTML = schedules.map(schedule => `
                <div class="schedule-day">
                    <div class="schedule-day-header">
                        <div class="schedule-day-title">
                            <strong>${schedule.nome}</strong>
                            <span class="badge badge-blue">${schedule.tipo}</span>
                        </div>
                        <div>
                            ${currentUser.cargo === 'ADMIN' || currentUser.cargo === 'DIRETOR' ? 
                                `<button class="btn btn-secondary" onclick="openEditScheduleModal(${schedule.id})">
                                    ✏️ Editar
                                </button>` : ''}
                        </div>
                    </div>
                    <div>
                        <p><strong>Período:</strong> ${formatDate(schedule.data_inicio)} a ${formatDate(schedule.data_fim)}</p>
                        <div id="scheduleDays-${schedule.id}">
                            <div class="loading">Carregando dias...</div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = schedulesHTML;
            
            // Carregar dias de cada escala
            schedules.forEach(schedule => {
                loadScheduleDays(schedule.id);
            });
        }

        function displayEvents(events) {
            const container = document.getElementById('eventsList');
            
            if (events.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>Nenhum evento encontrado</h3>
                        <p>Crie seu primeiro evento para começar.</p>
                    </div>
                `;
                return;
            }
            
            const eventsHTML = events.map(event => `
                <div class="schedule-day">
                    <div class="schedule-day-header">
                        <div class="schedule-day-title">
                            <strong>${event.nome}</strong>
                            <span class="badge badge-green">Evento</span>
                        </div>
                    </div>
                    <div>
                        <p><strong>Período:</strong> ${formatDate(event.data_inicio)} a ${formatDate(event.data_fim)}</p>
                        ${event.descricao ? `<p><strong>Descrição:</strong> ${event.descricao}</p>` : ''}
                        <div id="eventDays-${event.id}">
                            <div class="loading">Carregando dias...</div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = eventsHTML;
            
            // Carregar dias de cada evento
            events.forEach(event => {
                loadEventDays(event.id);
            });
        }

        async function loadScheduleDays(scheduleId) {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/api/schedules/${scheduleId}/days`, {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (response.ok) {
                    const days = await response.json();
                    displayScheduleDays(scheduleId, days);
                }
            } catch (error) {
                console.error('Erro ao carregar dias da escala:', error);
            }
        }

        async function loadEventDays(eventId) {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/api/events/${eventId}/days`, {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (response.ok) {
                    const days = await response.json();
                    displayEventDays(eventId, days);
                }
            } catch (error) {
                console.error('Erro ao carregar dias do evento:', error);
            }
        }

        function displayScheduleDays(scheduleId, days) {
            const container = document.getElementById(`scheduleDays-${scheduleId}`);
            
            if (days.length === 0) {
                container.innerHTML = '<p><em>Nenhum dia configurado</em></p>';
                return;
            }
            
            const daysHTML = days.map(day => `
                <div class="schedule-user">
                    <strong>${getDayDisplay(day.dia_semana)}${day.data_especifica ? ` (${formatDate(day.data_especifica)})` : ''}:</strong>
                    ${day.usuario_nome}
                </div>
            `).join('');
            
            container.innerHTML = daysHTML;
        }

        function displayEventDays(eventId, days) {
            const container = document.getElementById(`eventDays-${eventId}`);
            
            if (days.length === 0) {
                container.innerHTML = '<p><em>Nenhum dia configurado</em></p>';
                return;
            }
            
            const daysHTML = days.map(day => `
                <div class="schedule-user">
                    <strong>${formatDate(day.data_especifica)}:</strong>
                    ${day.usuario_nome}
                </div>
            `).join('');
            
            container.innerHTML = daysHTML;
        }

        // Funções de Criação
        async function createSchedule() {
            const data = {}; // dias são fixos no servidor (sábado, domingo, quarta)
            
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/schedules', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    console.log('Escala mensal criada com sucesso!');
                    closeCreateScheduleModal();
                    loadSchedules();
                } else {
                    const error = await response.json();
                    console.log(error.error || 'Erro ao criar escala');
                }
            } catch (error) {
                console.error('Erro ao criar escala:', error);
                console.log('Erro de conexão ao criar escala');
            }
        }

        async function submitCreateEvent() {
            const form = document.getElementById('createEventForm');
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);

            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/events', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    closeCreateEventModal();
                    loadEvents();
                } else {
                    const err = await response.json();
                    alert(err.error || 'Erro ao criar evento');
                }
            } catch (error) {
                alert('Erro de conexão ao criar evento');
            }
        }

        // Funções de Edição
        async function loadScheduleForEdit(scheduleId) {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/api/schedules/${scheduleId}`, {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (response.ok) {
                    const schedule = await response.json();
                    displayEditSchedule(schedule);
                }
            } catch (error) {
                console.error('Erro ao carregar escala para edição:', error);
            }
        }

        function displayEditSchedule(schedule) {
            const container = document.getElementById('editScheduleContent');
            
            const daysHTML = schedule.dias.map(day => `
                <div class="form-group">
                    <label class="form-label">${getDayDisplay(day.dia_semana)}${day.data_especifica ? ` (${formatDate(day.data_especifica)})` : ''}</label>
                    <select class="form-input" data-day-id="${day.id}" data-dia="${day.dia_semana}">
                        <option value="">Selecione um usuário</option>
                        ${availableUsers.map(user => `
                            <option value="${user.id}" ${user.id === day.usuario_id ? 'selected' : ''}>
                                ${user.nome}
                            </option>
                        `).join('')}
                    </select>
                </div>
            `).join('');
            
            container.innerHTML = daysHTML;
        }

        async function saveSchedule() {
            if (!currentSchedule) return;
            
            const selects = document.querySelectorAll('#editScheduleContent select');
            const updates = [];
            
            selects.forEach(select => {
                const dayId = select.dataset.dayId;
                const userId = select.value;
                
                if (userId) {
                    updates.push({
                        id: dayId,
                        usuario_id: userId
                    });
                }
            });
            
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/api/schedules/${currentSchedule}/days`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ days: updates })
                });
                
                if (response.ok) {
                    console.log('Escala atualizada com sucesso!');
                    closeEditScheduleModal();
                    loadSchedules();
                } else {
                    const error = await response.json();
                    console.log(error.error || 'Erro ao atualizar escala');
                }
            } catch (error) {
                console.error('Erro ao atualizar escala:', error);
                console.log('Erro de conexão ao atualizar escala');
            }
        }

        // Funções Utilitárias
        function formatDate(dateString) {
            if (!dateString) return '';
            // Divide a string "YYYY-MM-DD" diretamente — evita conversão UTC→local
            const [ano, mes, dia] = dateString.split('-');
            return `${dia}/${mes}/${ano}`;
        }

        function getDayDisplay(day) {
            const days = {
                'segunda': 'Segunda-feira',
                'terca': 'Terça-feira',
                'quarta': 'Quarta-feira',
                'quinta': 'Quinta-feira',
                'sexta': 'Sexta-feira',
                'sabado': 'Sábado',
                'domingo': 'Domingo'
            };
            return days[day] || day;
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
        }

        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.remove('open');
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/auth';
        }
    </script>
</body>
</html>
