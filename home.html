<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - SoundHub</title>
    <link rel="stylesheet" href="/css/home.css">
</head>
<body>
    <header class="header">
        <div class="logo">🎵 SoundHub</div>
        <div class="user-info">
            <span id="userName">Carregando...</span>
            <span id="userRole" style="color: #6b7280;">Carregando...</span>
            <button class="btn btn-secondary" onclick="logout()">Sair</button>
        </div>
    </header>

    
    <main class="main-content">
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">📁 Arquivos Disponíveis</h2>
                <button class="btn btn-primary" onclick="loadFiles()">
                    🔄 Atualizar
                </button>
            </div>
            
            <div id="filesContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Carregando arquivos...</div>
                </div>
            </div>
        </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Variáveis globais
        let currentUser = null;
        let socket = null;

        // Verificar autenticação ao carregar
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
        });

        // Verificar autenticação
        async function checkAuth() {
            const token = localStorage.getItem('token');
            
            if (!token) {
                window.location.href = '/auth';
                return;
            }
            
            try {
                const response = await fetch('/api/auth/me', {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    currentUser = data.user;
                    updateUserInterface();
                    loadFiles();
                    initSocket();
                } else {
                    localStorage.removeItem('token');
                    window.location.href = '/auth';
                }
            } catch (error) {
                console.error('Erro na autenticação:', error);
                localStorage.removeItem('token');
                window.location.href = '/auth';
            }
        }

        // Atualizar interface do usuário
        function updateUserInterface() {
            if (!currentUser) return;
            
            document.getElementById('userName').textContent = currentUser.nome;
            document.getElementById('userRole').textContent = currentUser.cargo;
            
            // Sidebar gerenciada pelo sidebar.js
            if (typeof updateSidebar === 'function') updateSidebar(currentUser);
        }

        // Inicializar Socket.io
        function initSocket() {
            socket = io();
            
            socket.on('connect', () => {
                console.log('Conectado ao WebSocket');
            });
            
            socket.on('disconnect', () => {
                console.log('Desconectado do WebSocket');
            });
            
            // Escutar atualizações de arquivos
            socket.on('fileUpdated', () => {
                loadFiles();
            });
        }

        // Carregar arquivos
        async function loadFiles() {
            const filesContainer = document.getElementById('filesContainer');
            
            try {
                const response = await fetch('/api/files');
                const files = await response.json();
                
                if (files.length === 0) {
                    filesContainer.innerHTML = `
                        <div class="empty-state">
                            <h3>📁 Nenhum Arquivo</h3>
                            <p>Nenhum arquivo aprovado disponível para download.</p>
                        </div>
                    `;
                    return;
                }
                
                // Agrupar arquivos por data
                const filesByDate = {};
                files.forEach(file => {
                    const date = new Date(file.data_upload).toLocaleDateString('pt-BR');
                    if (!filesByDate[date]) {
                        filesByDate[date] = [];
                    }
                    filesByDate[date].push(file);
                });
                
                // Ordenar datas (mais recente primeiro)
                const sortedDates = Object.keys(filesByDate).sort((a, b) => {
                    return new Date(b) - new Date(a);
                });
                
                // Gerar HTML agrupado por data
                const filesHTML = sortedDates.map(date => {
                    const filesOfDay = filesByDate[date];
                    const dayFilesHTML = filesOfDay.map(file => {
                        const fileType = file.tipo.includes('image') ? 'image' : 
                                       file.tipo.includes('video') ? 'video' : 'pdf';
                        
                        const typeClass = `type-${fileType}`;
                        const typeName = fileType === 'image' ? 'Imagem' : 
                                       fileType === 'video' ? 'Vídeo' : 'PDF';
                        
                        const uploadTime = new Date(file.data_upload).toLocaleTimeString('pt-BR', { 
                            hour: '2-digit', 
                            minute: '2-digit' 
                        });
                        
                        return `
                            <div class="file-item">
                                <div class="file-info">
                                    <h3>${file.nome}</h3>
                                    <p>Enviado por: ${file.usuario_nome || 'Desconhecido'}</p>
                                    <p>Horário: ${uploadTime}</p>
                                    <span class="file-type ${typeClass}">${typeName}</span>
                                </div>
                                <div style="margin-top: 1rem;">
                                    <a href="${file.caminho}" download="${file.nome}" class="btn btn-primary">
                                        📥 Baixar
                                    </a>
                                </div>
                            </div>
                        `;
                    }).join('');
                    
                    return `
                        <div class="date-group">
                            <div class="date-header">
                                <h3>📅 ${date}</h3>
                                <span class="file-count">${filesOfDay.length} arquivo${filesOfDay.length > 1 ? 's' : ''}</span>
                            </div>
                            <div class="file-grid">${dayFilesHTML}</div>
                        </div>
                    `;
                }).join('');
                
                filesContainer.innerHTML = filesHTML;
                
            } catch (error) {
                console.error('Erro ao carregar arquivos:', error);
                filesContainer.innerHTML = `
                    <div class="empty-state">
                        <h3>❌ Erro ao Carregar</h3>
                        <p>Não foi possível carregar os arquivos. Tente novamente.</p>
                    </div>
                `;
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/auth';
        }
    </script>
    <script src="navigation.js"></script>
</body>
</html>
