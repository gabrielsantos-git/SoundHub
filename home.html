<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - SoundHub</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #f9fafb;
            min-height: 100vh;
        }
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            flex-direction: column;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e5e7eb;
            border-top: 5px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .message {
            color: #6b7280;
            font-size: 1.1rem;
        }
        .error {
            color: #dc2626;
            background: #fef2f2;
            padding: 1rem;
            border-radius: 0.5rem;
            border: 1px solid #fecaca;
            max-width: 400px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="message">Carregando SoundHub...</div>
    </div>
    <div class="error" id="error" style="display: none;">
        <h3>Erro de Autenticação</h3>
        <p>Você precisa estar logado para acessar esta página.</p>
        <a href="/auth" style="color: #3b82f6; text-decoration: none; font-weight: 600;">Acessar Sistema</a>
    </div>

    <script>
        // Verificar autenticação
        async function checkAuth() {
            const token = localStorage.getItem('token');
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            
            if (!token) {
                // Redirecionar automaticamente após 1 segundo (fallback)
                setTimeout(() => {
                    window.location.href = '/auth';
                }, 1000);
                loading.style.display = 'none';
                error.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch('/api/auth/me', {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (response.ok) {
                    // Redirecionar para o app Next.js
                    window.location.href = '/home/app';
                } else {
                    // Token inválido, remover e mostrar erro
                    localStorage.removeItem('token');
                    loading.style.display = 'none';
                    error.style.display = 'block';
                }
            } catch (error) {
                loading.style.display = 'none';
                error.style.display = 'block';
            }
        }
        
        // Verificar ao carregar
        checkAuth();
    </script>
</body>
</html>
