<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/assets/SounHub-03.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeção - SoundHub</title>
    <link rel="stylesheet" href="/css/projection.css">
</head>
<body>
    <div class="fullscreen-prompt" id="fullscreenPrompt">
        <div class="fullscreen-prompt-content">
            <h2>🎥 SoundHub</h2>
            <p>Clique aqui ou pressione <kbd>F</kbd> para abrir em tela cheia</p>
        </div>
    </div>

    <div class="projection-container">
        <div class="media-container" id="mediaContainer">
            <div class="loading">
                <div class="spinner"></div>
                <h2>🎥 SoundHub</h2>
                <p>Preparando projeção...</p>
            </div>
        </div>

        <!-- Controles de vídeo (aparece só quando projeta vídeo) -->
        <div class="video-controls" id="videoControls">
            <button id="playPauseBtn" class="play-pause-btn" onclick="togglePlayPause()" title="Play / Pause">▶</button>
            <div class="progress-bar" onclick="seekVideo(event)" title="Clique para navegar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-display" id="timeDisplay">00:00 / 00:00</div>
        </div>

        <!-- Informações da mídia -->
        <div class="media-info" id="mediaInfo">
            <h3 id="mediaTitle">Carregando...</h3>
            <p id="mediaDescription">Aguardando informações...</p>
        </div>
    </div>

    <script>
        // Estado da Projeção
        const ProjectionState = {
            mediaList: [],
            currentMediaIndex: 0,
            currentMedia: null,
            isPlaying: false,
            broadcastChannel: null,
            controlsTimeout: null
        };

        // Inicialização
        document.addEventListener('DOMContentLoaded', function() {
            initializeProjection();
        });

        function initializeProjection() {
            ProjectionState.broadcastChannel = new BroadcastChannel('soundhub-projection');
            ProjectionState.broadcastChannel.onmessage = handleControlMessage;
            ProjectionState.broadcastChannel.postMessage({ type: 'PROJECTION_READY' });
            setupKeyboardControls();
            document.addEventListener('mousemove', revealVideoControls);

            // Fullscreen prompt: click overlay to enter fullscreen
            const prompt = document.getElementById('fullscreenPrompt');
            prompt.addEventListener('click', () => {
                requestFullscreen();
                prompt.style.display = 'none';
            });

            // Hide prompt automatically if fullscreen is granted without click
            document.addEventListener('fullscreenchange', () => {
                prompt.style.display = document.fullscreenElement ? 'none' : 'flex';
            });

            // Try auto-fullscreen; browser may allow it on fresh window open
            requestFullscreen();
        }

        function revealVideoControls() {
            const controls = document.getElementById('videoControls');
            if (!controls.classList.contains('show')) return;
            controls.classList.remove('fading');
            clearTimeout(ProjectionState.controlsTimeout);
            ProjectionState.controlsTimeout = setTimeout(() => {
                controls.classList.add('fading');
            }, 3000);
        }

        function handleControlMessage(event) {
            console.log('Mensagem recebida na projeção:', event.data); // <-- DEBUG
            const { type, data } = event.data;
            
            switch (type) {
                case 'INITIALIZE_PROJECTION':
                    initializeMedia(data.mediaList, data.currentMediaIndex);
                    break;

                case 'CHANGE_MEDIA':
                    changeMedia(data.mediaIndex, data.media);
                    break;

                case 'TOGGLE_PLAY_PAUSE':
                    togglePlayPause();
                    break;

                case 'TOGGLE_FULLSCREEN':
                    toggleFullscreen();
                    break;
            }
        }

        function initializeMedia(mediaList, currentIndex) {
            ProjectionState.mediaList = mediaList;
            ProjectionState.currentMediaIndex = currentIndex;

            if (mediaList.length > 0) {
                loadMedia(mediaList[currentIndex]);
                requestFullscreen();
            } else {
                showError('Nenhuma mídia disponível para projeção.');
            }
        }

        function changeMedia(mediaIndex, media) {
            ProjectionState.currentMediaIndex = mediaIndex;
            loadMedia(media);
        }

        function loadMedia(media) {
            console.log('Carregando mídia na projeção:', media);
            
            ProjectionState.currentMedia = media;
            
            // Limpar container
            const container = document.getElementById('mediaContainer');
            container.innerHTML = '';
            
            // Esconder controles de vídeo
            document.getElementById('videoControls').classList.remove('show');
            
            if (media.tipo === 'image') {
                loadImage(media);
            } else if (media.tipo === 'video') {
                loadVideo(media);
            }
            
            // Atualizar informações
            updateMediaInfo(media);
        }

        function loadImage(media) {
            const img = document.createElement('img');
            img.src = media.url;
            img.className = 'media-image';
            img.alt = media.nome;
            
            img.onload = () => {
                console.log('Imagem carregada:', media.nome);
                document.getElementById('mediaContainer').appendChild(img);
                showMediaInfo();
            };
            
            img.onerror = () => {
                console.error('Erro ao carregar imagem:', media.url);
                showError('Erro ao carregar imagem: ' + media.nome);
            };
        }

        function loadVideo(media) {
            const video = document.createElement('video');
            video.className = 'media-video';
            video.controls = false;
            video.autoplay = true;
            video.loop = false;

            video.onloadedmetadata = () => {
                console.log('Vídeo carregado:', media.nome);
                document.getElementById('mediaContainer').appendChild(video);
                const controls = document.getElementById('videoControls');
                controls.classList.add('show');
                controls.classList.remove('fading');
                setupVideoEvents(video);
                startProgressUpdate(video);
                showMediaInfo();
                ProjectionState.controlsTimeout = setTimeout(() => controls.classList.add('fading'), 3000);
            };

            video.onerror = () => {
                console.error('Erro ao carregar vídeo:', media.url || '(fragmentado)');
                showError('Erro ao carregar vídeo: ' + media.nome);
            };

            video.onplay  = () => { ProjectionState.isPlaying = true;  updatePlayPauseButton(); };
            video.onpause = () => { ProjectionState.isPlaying = false; updatePlayPauseButton(); };
            video.onended = () => { setTimeout(() => { nextMedia(); }, 1000); };

            if (media.isChunked && Array.isArray(media.chunkUrls) && media.chunkUrls.length > 0) {
                loadChunkedVideo(video, media);
            } else {
                video.src = media.url;
            }
        }

        async function loadChunkedVideo(video, media) {
            const container = document.getElementById('mediaContainer');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.innerHTML = '<div class="spinner"></div><p>Carregando vídeo...</p>';
            container.appendChild(loadingDiv);

            try {
                const blobs = [];
                for (let i = 0; i < media.chunkUrls.length; i++) {
                    loadingDiv.querySelector('p').textContent =
                        'Carregando parte ' + (i + 1) + ' de ' + media.chunkUrls.length + '...';
                    const resp = await fetch(media.chunkUrls[i]);
                    if (!resp.ok) throw new Error('Falha ao baixar parte ' + (i + 1));
                    blobs.push(await resp.blob());
                }
                const combined = new Blob(blobs, { type: media.mimeType });
                video.src = URL.createObjectURL(combined);
            } catch (e) {
                console.error('Erro ao carregar vídeo fragmentado:', e);
                showError('Erro ao carregar vídeo: ' + media.nome);
            } finally {
                if (container.contains(loadingDiv)) container.removeChild(loadingDiv);
            }
        }

        function setupVideoEvents(video) {
            // Click para play/pause
            video.addEventListener('click', () => {
                togglePlayPause();
            });
        }

        function startProgressUpdate(video) {
            video.addEventListener('timeupdate', () => updateVideoProgress(video));
        }

        function updateVideoProgress(video) {
            const current = formatTime(video.currentTime);
            const duration = formatTime(video.duration);
            
            document.getElementById('timeDisplay').textContent = current + ' / ' + duration;
            
            // Atualizar barra de progresso
            const percentage = (video.currentTime / video.duration) * 100;
            document.getElementById('progressFill').style.width = percentage + '%';
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '00:00';
            
            const minutes = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            
            return minutes.toString().padStart(2, '0') + ':' + secs.toString().padStart(2, '0');
        }

        function updateMediaInfo(media) {
            document.getElementById('mediaTitle').textContent = media.nome || 'Mídia';
            document.getElementById('mediaDescription').textContent = 
                media.tipo === 'image' ? 'Imagem' : 'Vídeo';
        }

        function showMediaInfo() {
            const infoEl = document.getElementById('mediaInfo');
            infoEl.classList.add('show');
            
            setTimeout(() => {
                infoEl.classList.remove('show');
            }, 3000);
        }

        function showError(message) {
            const container = document.getElementById('mediaContainer');
            container.innerHTML = `
                <div class="error-message">
                    <h2>❌ Erro</h2>
                    <p>${message}</p>
                </div>
            `;
        }

        // Controles de Mídia
        function previousMedia() {
            if (ProjectionState.mediaList.length === 0) return;

            const newIndex = ProjectionState.currentMediaIndex === 0 ?
                ProjectionState.mediaList.length - 1 :
                ProjectionState.currentMediaIndex - 1;

            ProjectionState.currentMediaIndex = newIndex;
            loadMedia(ProjectionState.mediaList[newIndex]);
            ProjectionState.broadcastChannel.postMessage({
                type: 'MEDIA_CHANGED',
                data: { index: newIndex, media: ProjectionState.mediaList[newIndex] }
            });
        }

        function nextMedia() {
            if (ProjectionState.mediaList.length === 0) return;

            const newIndex = (ProjectionState.currentMediaIndex + 1) % ProjectionState.mediaList.length;
            ProjectionState.currentMediaIndex = newIndex;
            loadMedia(ProjectionState.mediaList[newIndex]);
            ProjectionState.broadcastChannel.postMessage({
                type: 'MEDIA_CHANGED',
                data: { index: newIndex, media: ProjectionState.mediaList[newIndex] }
            });
        }

        function togglePlayPause() {
            const video = document.querySelector('.media-video');
            if (!video) return;
            
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
        }

        function updatePlayPauseButton() {
            const btn = document.getElementById('playPauseBtn');
            btn.textContent = ProjectionState.isPlaying ? '⏸' : '▶';
        }

        function seekVideo(event) {
            const video = document.querySelector('.media-video');
            if (!video) return;
            
            const progressBar = event.currentTarget;
            const clickX = event.offsetX;
            const width = progressBar.offsetWidth;
            const percentage = clickX / width;
            
            video.currentTime = percentage * video.duration;
        }

        // Controles de Tela
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                requestFullscreen();
            } else {
                exitFullscreen();
            }
        }

        function requestFullscreen() {
            const elem = document.documentElement;
            
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
        }

        function exitFullscreen() {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            } else if (document.msExitFullscreen) {
                document.msExitFullscreen();
            }
        }

        // Controles de Teclado
        function setupKeyboardControls() {
            document.addEventListener('keydown', handleKeyPress);
        }

        function handleKeyPress(event) {
            switch (event.key) {
                case 'ArrowLeft':
                    event.preventDefault();
                    previousMedia();
                    break;
                case 'ArrowRight':
                    event.preventDefault();
                    nextMedia();
                    break;
                case ' ':
                    event.preventDefault();
                    togglePlayPause();
                    break;
                case 'f':
                case 'F':
                    event.preventDefault();
                    toggleFullscreen();
                    break;
                case 'Escape':
                    event.preventDefault();
                    // Fechar janela de projeção
                    window.close();
                    break;
            }
        }

        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (ProjectionState.broadcastChannel) {
                ProjectionState.broadcastChannel.postMessage({
                    type: 'PROJECTION_CLOSED'
                });
                ProjectionState.broadcastChannel.close();
            }
        });
    </script>
</body>
</html>
