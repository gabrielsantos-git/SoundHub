<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundHub - Cadastro</title>
    <link rel="stylesheet" href="/css/auth.css">
    <style>
        #step2 { display: none; }
        .code-input-wrap { display: flex; justify-content: center; margin: 1.5rem 0; }
        #codeInput {
            font-size: 2rem; font-weight: 800; letter-spacing: 0.5rem;
            text-align: center; width: 11rem; padding: 0.75rem 1rem;
            border: 2px solid #e5e7eb; border-radius: 12px;
            outline: none; background: #f8fafc; color: #111827;
        }
        #codeInput:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.12); }
        .resend-link { text-align: center; margin-top: 0.5rem; font-size: 0.875rem; color: #6b7280; }
        .resend-link button { background: none; border: none; color: #3b82f6; cursor: pointer; font-size: inherit; padding: 0; }
        .resend-link button:disabled { color: #9ca3af; cursor: default; }
        .masked-email { text-align: center; color: #374151; font-size: 0.9375rem; margin-bottom: 0.5rem; }
        .back-link { text-align: center; margin-top: 1rem; font-size: 0.875rem; }
        .back-link button { background: none; border: none; color: #6b7280; cursor: pointer; font-size: inherit; text-decoration: underline; padding: 0; }
    </style>
</head>
<body>
    <div class="auth-wrapper">

        <!-- Painel esquerdo: formulário -->
        <div class="auth-form-panel">
            <div id="message" class="message"></div>

            <div style="margin-bottom: 2.5rem;">
                <div style="font-size: 1.5rem; font-weight: 800; color: #3b82f6; letter-spacing: -0.5px; margin-bottom: 0.25rem;">SoundHub</div>
            </div>

            <!-- ETAPA 1: Dados do cadastro -->
            <div id="step1">
                <h1 class="auth-form-title">Criar conta</h1>
                <p class="auth-form-subtitle">Preencha os dados abaixo para solicitar acesso.</p>
                <form id="registerForm" onsubmit="handleSendCode(event)">
                    <div class="form-group">
                        <label for="registerName">Nome completo</label>
                        <input type="text" id="registerName" name="nome" placeholder="Seu nome" required>
                    </div>
                    <div class="form-group">
                        <label for="registerEmail">Endereço de email</label>
                        <input type="email" id="registerEmail" name="email" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="registerPassword">Senha</label>
                        <div class="password-wrapper">
                            <input type="password" id="registerPassword" name="senha" placeholder="Mínimo 8 caracteres" minlength="8" required>
                            <button type="button" class="password-toggle" onclick="togglePassword('registerPassword', this)" aria-label="Mostrar senha">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirmar senha</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirmPassword" name="confirmSenha" placeholder="Repita a senha" minlength="8" required>
                            <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword', this)" aria-label="Mostrar senha">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="form-group consent-group">
                        <label class="consent-label">
                            <input type="checkbox" id="consentCheck" required>
                            <span>Li e aceito a <a href="/privacidade" target="_blank">Política de Privacidade</a> e autorizo o tratamento dos meus dados conforme a LGPD.</span>
                        </label>
                    </div>
                    <button type="submit" class="btn-submit" id="sendCodeBtn">
                        <span id="sendCodeBtnText">Continuar</span>
                        <div class="loading-spinner" id="sendCodeSpinner" style="display:none;"></div>
                    </button>
                    <div class="info-box">
                        Após o cadastro, aguarde a aprovação de um administrador para acessar o sistema.
                    </div>
                </form>
                <p class="auth-switch">Já tem uma conta? <a href="/auth">Entrar</a></p>
            </div>

            <!-- ETAPA 2: Verificação de email -->
            <div id="step2">
                <h1 class="auth-form-title">Verificar email</h1>
                <p class="auth-form-subtitle">Enviamos um código de 6 dígitos para:</p>
                <p class="masked-email" id="maskedEmail"></p>
                <form onsubmit="handleRegister(event)">
                    <div class="code-input-wrap">
                        <input type="text" id="codeInput" inputmode="numeric" pattern="[0-9]{6}"
                               maxlength="6" placeholder="000000" autocomplete="one-time-code" required>
                    </div>
                    <button type="submit" class="btn-submit" id="confirmBtn">
                        <span id="confirmBtnText">Confirmar cadastro</span>
                        <div class="loading-spinner" id="confirmSpinner" style="display:none;"></div>
                    </button>
                </form>
                <div class="resend-link">
                    Não recebeu? <button id="resendBtn" onclick="resendCode()">Reenviar código</button>
                </div>
                <div class="back-link">
                    <button onclick="goBack()">← Voltar e corrigir dados</button>
                </div>
            </div>
        </div>

        <!-- Painel direito: imagem de mesa de som -->
        <div class="auth-image-panel">
            <img src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?w=800&q=80" alt="Mesa de som">
        </div>
    </div>

    <script>
        let pendingData = null;

        function showMessage(text, type) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = `message ${type}`;
            if (type === 'success') setTimeout(() => { el.className = 'message'; el.textContent = ''; }, 5000);
        }

        function setLoading(btnId, spinnerId, loading) {
            const btn = document.getElementById(btnId);
            const text = document.getElementById(btnId + 'Text');
            const spinner = document.getElementById(spinnerId);
            btn.disabled = loading;
            if (text) text.style.display = loading ? 'none' : 'inline';
            if (spinner) spinner.style.display = loading ? 'block' : 'none';
        }

        function maskEmail(email) {
            const [user, domain] = email.split('@');
            const visible = user.length <= 2 ? user[0] : user.slice(0, 2);
            return visible + '***@' + domain;
        }

        function goBack() {
            showMessage('', '');
            document.getElementById('step1').style.display = '';
            document.getElementById('step2').style.display = 'none';
            document.getElementById('codeInput').value = '';
        }

        async function resendCode() {
            const btn = document.getElementById('resendBtn');
            btn.disabled = true;
            showMessage('Reenviando...', '');
            try {
                const res = await fetch('/api/auth/send-register-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: pendingData.email })
                });
                const result = await res.json();
                if (res.ok) {
                    showMessage('Novo código enviado!', 'success');
                    document.getElementById('codeInput').value = '';
                    document.getElementById('codeInput').focus();
                    setTimeout(() => { btn.disabled = false; }, 30000);
                } else {
                    showMessage(result.error || 'Erro ao reenviar código.', 'error');
                    btn.disabled = false;
                }
            } catch {
                showMessage('Erro de conexão.', 'error');
                btn.disabled = false;
            }
        }

        async function handleSendCode(event) {
            event.preventDefault();
            const form = event.target;
            const data = Object.fromEntries(new FormData(form));

            if (!document.getElementById('consentCheck').checked) {
                showMessage('Você precisa aceitar a Política de Privacidade para continuar.', 'error');
                return;
            }
            if (data.senha !== data.confirmSenha) {
                showMessage('As senhas não coincidem.', 'error');
                return;
            }
            if (data.senha.length < 8) {
                showMessage('A senha deve ter pelo menos 8 caracteres.', 'error');
                return;
            }

            setLoading('sendCodeBtn', 'sendCodeSpinner', true);
            showMessage('', '');

            try {
                const res = await fetch('/api/auth/send-register-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: data.email })
                });
                const result = await res.json();

                if (res.ok) {
                    pendingData = { nome: data.nome, email: data.email, senha: data.senha };
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                    document.getElementById('maskedEmail').textContent = maskEmail(data.email);
                    document.getElementById('codeInput').focus();
                    showMessage('Código enviado para o seu email.', 'success');
                } else {
                    showMessage(result.error || 'Erro ao enviar código.', 'error');
                }
            } catch {
                showMessage('Erro de conexão. Tente novamente.', 'error');
            } finally {
                setLoading('sendCodeBtn', 'sendCodeSpinner', false);
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            const code = document.getElementById('codeInput').value.trim();

            if (!code || code.length !== 6) {
                showMessage('Digite o código de 6 dígitos.', 'error');
                return;
            }

            setLoading('confirmBtn', 'confirmSpinner', true);
            showMessage('', '');

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nome: pendingData.nome,
                        email: pendingData.email,
                        senha: pendingData.senha,
                        consentimento: true,
                        code
                    })
                });
                const result = await res.json();

                if (res.ok) {
                    showMessage('Cadastro realizado! Aguarde a aprovação de um administrador.', 'success');
                    setTimeout(() => { window.location.href = '/auth'; }, 2500);
                } else {
                    showMessage(result.error || result.message || 'Erro ao cadastrar.', 'error');
                    if (result.error && result.error.toLowerCase().includes('código')) {
                        document.getElementById('codeInput').value = '';
                        document.getElementById('codeInput').focus();
                    }
                }
            } catch {
                showMessage('Erro de conexão. Tente novamente.', 'error');
            } finally {
                setLoading('confirmBtn', 'confirmSpinner', false);
            }
        }

        // Permitir apenas dígitos no campo de código
        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('codeInput').addEventListener('input', function () {
                this.value = this.value.replace(/\D/g, '');
            });

            const token = localStorage.getItem('token');
            if (token) {
                fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } })
                    .then(r => { if (r.ok) window.location.href = '/'; else { localStorage.removeItem('token'); localStorage.removeItem('user'); } })
                    .catch(() => { localStorage.removeItem('token'); localStorage.removeItem('user'); });
            }
        });

        const EYE = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
        const EYE_OFF = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const show = input.type === 'password';
            input.type = show ? 'text' : 'password';
            btn.innerHTML = show ? EYE_OFF : EYE;
        }
    </script>
</body>
</html>
