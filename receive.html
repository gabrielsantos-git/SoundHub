<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receber Arquivos - SoundHub</title>
    <link rel="stylesheet" href="/css/receive.css">
</head>
<body>
    <!-- Sidebar unificada será injetada pelo sidebar.js -->
    <script src="sidebar.js"></script>

    <!-- Header -->
    <header class="header">
        <div class="logo">🎵 SoundHub</div>
        <div class="user-info">
            <span id="userName">Carregando...</span>
            <span id="userRole" style="padding: 0.25rem 0.75rem; background: #f3f4f6; border-radius: 9999px; font-size: 0.875rem;"></span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="card">
            <div class="card-header">
                <h1 class="card-title">Receber Arquivos</h1>
                <button class="btn btn-primary" onclick="refreshFiles()">
                    🔄 Atualizar
                </button>
            </div>
        </div>

        <div class="grid">
            <div>
                <div class="card">
                    <h2 class="card-title">QR Code para Upload</h2>
                    
                    <div id="qrContainer">
                        <div class="qr-container">
                            <p style="margin-top: 1rem; color: #6b7280; font-size: 0.875rem;">
                                Gerando QR Code automático...
                            </p>
                        </div>
                    </div>
                </div>
            </div>

            <div>
                <div class="card">
                    <h2 class="card-title">
                        Uploads Pendentes (<span id="pendingCount">0</span>)
                    </h2>
                    
                    <div id="pendingContainer">
                        <div class="loading">
                            <div class="spinner"></div>
                            <div>Carregando...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal de Autenticação -->
    <div class="overlay" id="authOverlay">
        <div class="auth-required">
            <h2>🔐 Acesso Restrito</h2>
            <p>Apenas Sonoplastas e Diretores podem acessar esta página.</p>
            <a href="/auth" class="btn btn-primary" style="width: 100%; margin-bottom: 0.5rem;">
                Fazer Login
            </a>
            <a href="/" class="btn btn-secondary" style="width: 100%;">
                Voltar ao Início
            </a>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentQRToken = null;
        let countdownInterval = null;
        let statusCheckInterval = null;

        // Definir funções antes de usar
        async function checkAuth() {
            const token = localStorage.getItem('token');

            if (!token) {
                window.location.href = '/auth';
                return;
            }

            try {
                const response = await fetch('/api/auth/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (response.ok) {
                    const data = await response.json();
                    currentUser = data.user;
                    updateUserInterface();

                    if (currentUser.cargo !== 'SONOPLASTA' && currentUser.cargo !== 'DIRETOR' && currentUser.cargo !== 'ADMIN') {
                        showAuthRequired();
                        return;
                    }

                    loadPendingFiles();
                } else {
                    localStorage.removeItem('token');
                    showAuthRequired();
                }
            } catch (error) {
                showAuthRequired();
            }
        }

        function showAuthRequired() {
            const authOverlay = document.getElementById('authOverlay');
            if (authOverlay) {
                authOverlay.classList.add('show');
            }
        }
        
        // Verificar autenticação ao carregar
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
        });
        
        // Gerar QR Code automaticamente após verificação de autenticação
        async function autoGenerateQR() {
            await new Promise(resolve => setTimeout(resolve, 1000));
            await generateQRCode();
        }

        function updateUserInterface() {
            if (!currentUser) return;

            document.getElementById('userName').textContent = currentUser.nome;
            document.getElementById('userRole').textContent = currentUser.cargo;

            // A sidebar é gerenciada pelo sidebar.js — nenhuma lógica duplicada aqui
            
            // Gerar QR Code automaticamente se tiver permissão
            if (currentUser.cargo === 'SONOPLASTA' || currentUser.cargo === 'DIRETOR' || currentUser.cargo === 'ADMIN') {
                autoGenerateQR();
            }
        }
        
        // Função generateQRCode manual para o botão "Gerar Novo"
        async function generateQRCode() {
            const qrContainer = document.getElementById('qrContainer');

            if (statusCheckInterval) clearInterval(statusCheckInterval);

            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    showAuthRequired();
                    return;
                }

                const response = await fetch('/api/qr/generate', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    currentQRToken = data.token;
                    
                    // Exibir QR code
                    qrContainer.innerHTML = `
                        <div class="qr-container">
                            <img src="${data.qrCode}" alt="QR Code" />
                            <div class="qr-status active" id="qrStatus">QR Code ativo - Escaneie para fazer upload</div>
                            <p style="margin-bottom: 1rem;">Escaneie este QR Code para fazer upload</p>
                            <button class="btn btn-secondary" onclick="generateQRCode()">
                                Gerar Novo
                            </button>
                        </div>
                    `;
                    
                    // Iniciar verificação de status
                    startStatusCheck();
                    
                } else if (response.status === 401 || response.status === 403) {
                    localStorage.removeItem('token');
                    showAuthRequired();
                } else {
                    throw new Error('Erro ao gerar QR Code');
                }
            } catch (error) {
                qrContainer.innerHTML = `
                    <div class="qr-container">
                        <p style="color: #ef4444;">Erro ao gerar QR Code</p>
                        <button class="btn btn-primary" onclick="generateQRCode()">
                            Tentar Novamente
                        </button>
                    </div>
                `;
            }
        }
        
        function startStatusCheck() {
            statusCheckInterval = setInterval(async () => {
                if (!currentQRToken) return;
                
                try {
                    const token = localStorage.getItem('token');
                    if (!token) return;
                    
                    const response = await fetch(`/api/qr/status/${currentQRToken}`, {
                        headers: {
                            'Authorization': 'Bearer ' + token
                        }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        
                        // Se o QR code foi utilizado, gerar novo
                        if (data.used) {
                            clearInterval(statusCheckInterval);
                            
                            const statusElement = document.getElementById('qrStatus');
                            if (statusElement) {
                                statusElement.className = 'qr-status expired';
                                statusElement.textContent = 'QR Code utilizado - Gerando novo...';
                            }
                            
                            // Gerar novo QR code automaticamente
                            setTimeout(() => {
                                generateQRCode();
                            }, 1000);
                        }
                    }
                } catch (error) {
                    console.error('Erro ao verificar status do QR code:', error);
                }
            }, 1000); // Verificar a cada segundo
        }
        
        async function loadPendingFiles() {
            const pendingContainer = document.getElementById('pendingContainer');
            
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    showAuthRequired();
                    return;
                }
                
                const response = await fetch('/api/files/pending', {
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const files = await response.json();
                    displayPendingFiles(files);
                } else if (response.status === 401 || response.status === 403) {
                    localStorage.removeItem('token');
                    showAuthRequired();
                } else {
                    throw new Error('Erro ao carregar arquivos');
                }
            } catch (error) {
                pendingContainer.innerHTML = `
                    <div class="empty-state">
                        <h3>❌ Erro ao Carregar</h3>
                        <p>Não foi possível carregar os arquivos pendentes.</p>
                        <button class="btn btn-primary" onclick="refreshFiles()">Tentar Novamente</button>
                    </div>
                `;
            }
        }
        
        function displayPendingFiles(files) {
            const pendingContainer = document.getElementById('pendingContainer');
            const pendingCount = document.getElementById('pendingCount');
            
            pendingCount.textContent = files.length;
            
            if (files.length === 0) {
                pendingContainer.innerHTML = `
                    <div class="empty-state">
                        <h3>📁 Nenhum Upload Pendente</h3>
                        <p>Nenhum upload pendente.</p>
                    </div>
                `;
                return;
            }
            
            const filesHTML = files.map(file => {
                const fileType = file.tipo.includes('image') ? 'image' : 
                               file.tipo.includes('video') ? 'video' : 'pdf';
                
                const typeClass = `type-${fileType}`;
                const typeName = fileType === 'image' ? 'Imagem' : 
                               fileType === 'video' ? 'Vídeo' : 'PDF';
                
                const fileSize = (file.tamanho / 1024 / 1024).toFixed(2);
                
                return `
                    <div class="file-item">
                        <div class="file-info">
                            <h3>${file.nome}</h3>
                            <p>${file.usuario_nome} • ${fileSize} MB</p>
                            <span class="file-type ${typeClass}">${typeName}</span>
                        </div>
                        <div class="file-actions">
                            <button class="btn btn-success" onclick="approveFile(${file.id})">
                                ✅ Receber
                            </button>
                            <button class="btn btn-danger" onclick="rejectFile(${file.id})">
                                ❌ Recusar
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            
            pendingContainer.innerHTML = filesHTML;
        }
        
        async function approveFile(fileId) {
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    showAuthRequired();
                    return;
                }
                
                const response = await fetch(`/api/files/${fileId}/approve`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    try {
                        await response.json();
                    } catch (parseError) {
                        // ignora erro de parse
                    }
                    loadPendingFiles();
                } else if (response.status === 401 || response.status === 403) {
                    localStorage.removeItem('token');
                    showAuthRequired();
                } else {
                    try {
                        await response.json();
                    } catch (parseError) {
                        // ignora erro de parse
                    }
                }
            } catch (error) {
                console.error('Erro de conexão ao aprovar arquivo:', error);
            }
        }

        async function rejectFile(fileId) {
            
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    showAuthRequired();
                    return;
                }
                
                const response = await fetch(`/api/files/${fileId}/reject`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    try {
                        await response.json();
                    } catch (parseError) {
                        // ignora erro de parse
                    }
                    loadPendingFiles();
                } else if (response.status === 401 || response.status === 403) {
                    localStorage.removeItem('token');
                    showAuthRequired();
                } else {
                    try {
                        await response.json();
                    } catch (parseError) {
                        // ignora erro de parse
                    }
                }
            } catch (error) {
                console.error('Erro de conexão ao recusar arquivo:', error);
            }
        }
        
        function refreshFiles() {
            const pendingContainer = document.getElementById('pendingContainer');
            pendingContainer.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Atualizando...</div>
                </div>
            `;
            loadPendingFiles();
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }
        
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }
        
        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('show');
        }
    </script>
    <script src="navigation.js"></script>
</body>
</html>
