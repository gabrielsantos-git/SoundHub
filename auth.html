<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundHub - Login</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-wrapper">

        <!-- Painel esquerdo: formulário -->
        <div class="auth-form-panel">
            <div id="message" class="message"></div>

            <div style="margin-bottom: 2.5rem;">
                <div style="font-size: 1.5rem; font-weight: 800; color: #3b82f6; letter-spacing: -0.5px; margin-bottom: 0.25rem;">SoundHub</div>
            </div>

            <h1 class="auth-form-title">Entrar na conta</h1>
            <p class="auth-form-subtitle">Bem-vindo de volta. Acesse sua conta.</p>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginEmail">Endereço de email</label>
                    <input type="email" id="loginEmail" name="email" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Senha</label>
                    <input type="password" id="loginPassword" name="senha" placeholder="Sua senha" required>
                </div>
                <button type="submit" class="btn-submit" id="loginBtn">
                    <span id="loginBtnText">Entrar</span>
                    <div class="loading-spinner" id="loginSpinner" style="display:none;"></div>
                </button>
            </form>
            <p class="auth-switch">Não tem uma conta? <a href="/register">Cadastre-se</a></p>
        </div>

        <!-- Painel direito: imagem de mesa de som -->
        <div class="auth-image-panel">
            <img src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?w=800&q=80" alt="Mesa de som">
        </div>
    </div>

    <script>
        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = `message ${type}`;
            if (type === 'success') setTimeout(() => { message.className = 'message'; message.textContent = ''; }, 5000);
        }

        function setLoading(form, loading) {
            const btn = form.querySelector('.btn-submit');
            const btnText = btn.querySelector('span[id*="Text"]');
            const spinner = btn.querySelector('.loading-spinner');
            btn.disabled = loading;
            btnText.style.display = loading ? 'none' : 'inline';
            spinner.style.display = loading ? 'block' : 'none';
        }

        async function handleLogin(event) {
            event.preventDefault();
            const form = event.target;
            const data = Object.fromEntries(new FormData(form));
            setLoading(form, true);
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                });
                const result = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('user', JSON.stringify(result.user));
                    showMessage('Login realizado! Redirecionando...', 'success');
                    setTimeout(() => { window.location.href = '/'; }, 1000);
                } else {
                    showMessage(result.message || 'Erro ao fazer login', 'error');
                }
            } catch {
                showMessage('Erro de conexão. Tente novamente.', 'error');
            } finally {
                setLoading(form, false);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            if (token) {
                fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } })
                    .then(r => { if (r.ok) window.location.href = '/'; else { localStorage.removeItem('token'); localStorage.removeItem('user'); } })
                    .catch(() => { localStorage.removeItem('token'); localStorage.removeItem('user'); });
            }
        });
    </script>
</body>
</html>
