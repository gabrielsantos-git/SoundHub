<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundHub - Login</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-wrapper">

        <!-- Painel esquerdo: formulário -->
        <div class="auth-form-panel">
            <div id="message" class="message"></div>

            <!-- LOGIN -->
            <div id="loginPanel" class="form-panel active">
                <h1 class="auth-form-title">Entrar na conta</h1>
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginEmail">Endereço de email</label>
                        <input type="email" id="loginEmail" name="email" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Senha</label>
                        <input type="password" id="loginPassword" name="senha" placeholder="Sua senha" required>
                    </div>
                    <button type="submit" class="btn-submit" id="loginBtn">
                        <span id="loginBtnText">Entrar</span>
                        <div class="loading-spinner" id="loginSpinner" style="display:none;"></div>
                    </button>
                </form>
                <p class="auth-switch">Não tem uma conta? <a href="#" onclick="switchPanel('register'); return false;">Cadastre-se</a></p>
            </div>

            <!-- CADASTRO -->
            <div id="registerPanel" class="form-panel">
                <h1 class="auth-form-title">Criar conta</h1>
                <form id="registerForm" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="registerName">Nome completo</label>
                        <input type="text" id="registerName" name="nome" placeholder="Seu nome" required>
                    </div>
                    <div class="form-group">
                        <label for="registerEmail">Endereço de email</label>
                        <input type="email" id="registerEmail" name="email" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="registerPassword">Senha</label>
                        <input type="password" id="registerPassword" name="senha" placeholder="Mínimo 6 caracteres" minlength="6" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirmar senha</label>
                        <input type="password" id="confirmPassword" name="confirmSenha" placeholder="Repita a senha" minlength="6" required>
                    </div>
                    <button type="submit" class="btn-submit" id="registerBtn">
                        <span id="registerBtnText">Cadastrar</span>
                        <div class="loading-spinner" id="registerSpinner" style="display:none;"></div>
                    </button>
                    <div class="info-box">
                        Após o cadastro, aguarde a aprovação de um administrador para acessar o sistema.
                    </div>
                </form>
                <p class="auth-switch">Já tem uma conta? <a href="#" onclick="switchPanel('login'); return false;">Entrar</a></p>
            </div>
        </div>

        <!-- Painel direito: imagem de mesa de som -->
        <div class="auth-image-panel">
            <img src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?w=800&q=80" alt="Mesa de som">
        </div>
    </div>

    <script>
        function switchPanel(panel) {
            document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(panel + 'Panel').classList.add('active');
            const msg = document.getElementById('message');
            msg.className = 'message';
            msg.textContent = '';
        }

        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = `message ${type}`;
            if (type === 'success') setTimeout(() => { message.className = 'message'; message.textContent = ''; }, 5000);
        }

        function setLoading(form, loading) {
            const btn = form.querySelector('.btn-submit');
            const btnText = btn.querySelector('span[id*="Text"]');
            const spinner = btn.querySelector('.loading-spinner');
            btn.disabled = loading;
            btnText.style.display = loading ? 'none' : 'inline';
            spinner.style.display = loading ? 'block' : 'none';
        }

        async function handleLogin(event) {
            event.preventDefault();
            const form = event.target;
            const data = Object.fromEntries(new FormData(form));
            setLoading(form, true);
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                });
                const result = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('user', JSON.stringify(result.user));
                    showMessage('Login realizado! Redirecionando...', 'success');
                    setTimeout(() => { window.location.href = '/'; }, 1000);
                } else {
                    showMessage(result.message || 'Erro ao fazer login', 'error');
                }
            } catch {
                showMessage('Erro de conexão. Tente novamente.', 'error');
            } finally {
                setLoading(form, false);
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            const form = event.target;
            const data = Object.fromEntries(new FormData(form));
            if (data.senha !== data.confirmSenha) { showMessage('As senhas não coincidem.', 'error'); return; }
            if (data.senha.length < 6) { showMessage('A senha deve ter pelo menos 6 caracteres.', 'error'); return; }
            setLoading(form, true);
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome: data.nome, email: data.email, senha: data.senha }),
                });
                const result = await response.json();
                if (response.ok) {
                    showMessage('Cadastro realizado! Aguarde aprovação para acessar.', 'success');
                    form.reset();
                    setTimeout(() => { switchPanel('login'); }, 2000);
                } else {
                    showMessage(result.message || 'Erro ao cadastrar', 'error');
                }
            } catch {
                showMessage('Erro de conexão. Tente novamente.', 'error');
            } finally {
                setLoading(form, false);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            if (token) {
                fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } })
                    .then(r => { if (r.ok) window.location.href = '/'; else { localStorage.removeItem('token'); localStorage.removeItem('user'); } })
                    .catch(() => { localStorage.removeItem('token'); localStorage.removeItem('user'); });
            }
        });
    </script>
</body>
</html>
