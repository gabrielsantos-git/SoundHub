<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundHub - Login e Registro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .auth-container {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 100%;
            overflow: hidden;
        }
        .auth-header {
            text-align: center;
            padding: 2rem 2rem 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .logo {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        .auth-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        .auth-subtitle {
            font-size: 0.875rem;
            opacity: 0.9;
        }
        .auth-tabs {
            display: flex;
            border-bottom: 1px solid #e5e7eb;
        }
        .auth-tab {
            flex: 1;
            padding: 1rem;
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            color: #6b7280;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }
        .auth-tab.active {
            color: #3b82f6;
            border-bottom-color: #3b82f6;
            background: #f8fafc;
        }
        .auth-tab:hover {
            color: #3b82f6;
        }
        .auth-content {
            padding: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #374151;
            font-weight: 500;
            font-size: 0.875rem;
        }
        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        input::placeholder {
            color: #9ca3af;
        }
        .btn {
            width: 100%;
            padding: 0.875rem 1rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
        }
        .message.error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            display: block;
        }
        .message.success {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
            display: block;
        }
        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #ffffff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e5e7eb;
        }
        .back-link a {
            color: #6b7280;
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.3s ease;
        }
        .back-link a:hover {
            color: #3b82f6;
        }
        .info-box {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 0.5rem;
            padding: 1rem;
            margin-top: 1rem;
            font-size: 0.875rem;
            color: #1d4ed8;
        }
        .info-box strong {
            display: block;
            margin-bottom: 0.25rem;
        }
        .form-panel {
            display: none;
        }
        .form-panel.active {
            display: block;
        }
        @media (max-width: 480px) {
            .auth-container {
                margin: 1rem;
            }
            .auth-header {
                padding: 1.5rem 1.5rem 1rem;
            }
            .auth-content {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Header -->
        <div class="auth-header">
            <div class="logo"></div>
            <h1 class="auth-title">SoundHub</h1>
            <p class="auth-subtitle">Sistema de mídia para igrejas</p>
        </div>

        <!-- Tabs -->
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login')">
                Login
            </button>
            <button class="auth-tab" onclick="switchTab('register')">
                Cadastro
            </button>
        </div>

        <!-- Content -->
        <div class="auth-content">
            <div id="message" class="message"></div>

            <!-- Login Form -->
            <div id="loginPanel" class="form-panel active">
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input 
                            type="email" 
                            id="loginEmail" 
                            name="email" 
                            placeholder="seu@email.com"
                            required
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="loginPassword">Senha</label>
                        <input 
                            type="password" 
                            id="loginPassword" 
                            name="senha" 
                            placeholder="Sua senha"
                            required
                        >
                    </div>
                    
                    <button type="submit" class="btn btn-primary" id="loginBtn">
                        <span id="loginBtnText">Entrar</span>
                        <div class="loading-spinner" id="loginSpinner" style="display: none;"></div>
                    </button>
                </form>
            </div>

            <!-- Register Form -->
            <div id="registerPanel" class="form-panel">
                <form id="registerForm" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="registerName">Nome Completo</label>
                        <input 
                            type="text" 
                            id="registerName" 
                            name="nome" 
                            placeholder="Seu nome completo"
                            required
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="registerEmail">Email</label>
                        <input 
                            type="email" 
                            id="registerEmail" 
                            name="email" 
                            placeholder="seu@email.com"
                            required
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="registerPassword">Senha (mínimo 6 caracteres)</label>
                        <input 
                            type="password" 
                            id="registerPassword" 
                            name="senha" 
                            placeholder="Crie uma senha"
                            minlength="6"
                            required
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword">Confirmar Senha</label>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmSenha" 
                            placeholder="Confirme sua senha"
                            minlength="6"
                            required
                        >
                    </div>
                    
                    <button type="submit" class="btn btn-primary" id="registerBtn">
                        <span id="registerBtnText">Cadastrar</span>
                        <div class="loading-spinner" id="registerSpinner" style="display: none;"></div>
                    </button>
                    
                    <div class="info-box">
                        <strong>Importante:</strong>
                        Após o cadastro, aguarde a aprovação de um administrador para acessar o sistema.
                    </div>
                </form>
            </div>
        </div>

        <!-- Back Link -->
        <div class="back-link">
            <a href="/">Voltar ao início</a>
        </div>
    </div>

    <script>
        // Switch between tabs
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.auth-tab');
            const panels = document.querySelectorAll('.form-panel');
            const message = document.getElementById('message');
            
            // Hide all panels and remove active class from tabs
            panels.forEach(panel => panel.classList.remove('active'));
            tabs.forEach(t => t.classList.remove('active'));
            
            // Clear message when switching tabs
            message.className = 'message';
            message.textContent = '';
            
            if (tab === 'login') {
                tabs[0].classList.add('active');
                document.getElementById('loginPanel').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('registerPanel').classList.add('active');
            }
        }

        // Show message
        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = `message ${type}`;
            
            // Auto hide after 5 seconds for success messages
            if (type === 'success') {
                setTimeout(() => {
                    message.className = 'message';
                    message.textContent = '';
                }, 5000);
            }
        }

        // Set loading state
        function setLoading(form, loading) {
            const btn = form.querySelector('.btn');
            const btnText = btn.querySelector('span[id*="Text"]');
            const spinner = btn.querySelector('.loading-spinner');
            
            if (loading) {
                btn.disabled = true;
                btnText.style.display = 'none';
                spinner.style.display = 'block';
            } else {
                btn.disabled = false;
                btnText.style.display = 'block';
                spinner.style.display = 'none';
            }
        }

        // Handle login
        async function handleLogin(event) {
            event.preventDefault();
            
            const form = event.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);
            
            setLoading(form, true);
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data),
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    // Store token and user data
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('user', JSON.stringify(result.user));
                    
                    showMessage('Login realizado com sucesso! Redirecionando...', 'success');
                    
                    // Redirect to home after 1 second
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showMessage(result.message || 'Erro ao fazer login', 'error');
                }
            } catch (error) {
                showMessage('Erro de conexão. Tente novamente.', 'error');
            } finally {
                setLoading(form, false);
            }
        }

        // Handle register
        async function handleRegister(event) {
            event.preventDefault();
            
            const form = event.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);
            
            // Validate passwords match
            if (data.senha !== data.confirmSenha) {
                showMessage('As senhas não coincidem.', 'error');
                return;
            }
            
            // Validate password length
            if (data.senha.length < 6) {
                showMessage('A senha deve ter pelo menos 6 caracteres.', 'error');
                return;
            }
            
            setLoading(form, true);
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        nome: data.nome,
                        email: data.email,
                        senha: data.senha
                    }),
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showMessage('Cadastro realizado com sucesso! Aguarde aprovação para acessar.', 'success');
                    form.reset();
                    
                    // Switch to login tab after 2 seconds
                    setTimeout(() => {
                        switchTab('login');
                    }, 2000);
                } else {
                    showMessage(result.message || 'Erro ao fazer cadastro', 'error');
                }
            } catch (error) {
                showMessage('Erro de conexão. Tente novamente.', 'error');
            } finally {
                setLoading(form, false);
            }
        }

        // Check if user is already logged in
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            
            if (token) {
                // Verify token is still valid
                fetch('/api/auth/me', {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                })
                .then(response => {
                    if (response.ok) {
                        // User is logged in, redirect to home
                        window.location.href = '/';
                    } else {
                        // Token is invalid, remove it
                        localStorage.removeItem('token');
                        localStorage.removeItem('user');
                    }
                })
                .catch(() => {
                    // Error checking token, remove it
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                });
            }
        });
    </script>
</body>
</html>
